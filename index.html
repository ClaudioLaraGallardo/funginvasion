<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
#v{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#c{position:fixed;inset:0;width:100%;height:100%;z-index:2;}
#s{position:fixed;inset:0;z-index:10;background:#04000e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
#s h1{font-family:serif;font-size:18vw;color:#a855f7;letter-spacing:.1em;text-shadow:0 0 40px #7c3aed;}
#s p{color:#7c3aed77;font-size:10px;letter-spacing:.3em;font-family:monospace;}
#s button{background:none;border:1px solid #7c3aed55;color:#e9d5ff;font-family:monospace;font-size:11px;letter-spacing:.2em;padding:14px 38px;cursor:pointer;}
</style>
</head>
<body>
<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="s">
  <h1>FUNGI</h1>
  <p>AR · COLONIZACIÓN MICELIAL</p>
  <button id="btn">INICIAR INVASIÓN</button>
  <p style="opacity:.3;font-size:8px;">toca para sembrar</p>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),V=document.getElementById('v');
function rsz(){C.width=innerWidth;C.height=innerHeight;}
rsz();window.addEventListener('resize',rsz);

// ── Single coral puff — very cheap to draw ────────────────
function puff(x,y,r,hue,lit,a){
  if(r<1||a<.01)return;
  X.save();
  X.globalAlpha=a;
  const g=X.createRadialGradient(x-r*.2,y-r*.25,r*.05,x,y,r);
  g.addColorStop(0,`hsl(${hue-10},55%,${Math.min(88,lit+30)}%)`);
  g.addColorStop(.5,`hsl(${hue},70%,${lit+10}%)`);
  g.addColorStop(1,`hsl(${hue+18},55%,${Math.max(8,lit-15)}%)`);
  X.beginPath();X.arc(x,y,r,0,6.28);
  X.fillStyle=g;X.shadowBlur=r*.8;X.shadowColor=`hsl(${hue},85%,55%)`;
  X.fill();X.restore();
}

// ── Draw a strand between two points ─────────────────────
function strand(x1,y1,x2,y2,hue,w,a){
  X.save();
  X.globalAlpha=a*.6;
  X.strokeStyle=`hsl(${hue},72%,55%)`;
  X.lineWidth=w;X.lineCap='round';
  X.shadowBlur=w*5;X.shadowColor=`hsl(${hue},90%,65%)`;
  X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();
  X.globalAlpha=a*.85;
  X.strokeStyle=`hsl(${hue-5},50%,88%)`;
  X.lineWidth=w*.4;X.shadowBlur=w;X.stroke();
  X.restore();
}

// ── Colony: fixed structure, drawn cheaply each frame ─────
// Key insight: store final positions, just animate opacity+radius
class Colony{
  constructor(x,y){
    this.x=x;this.y=y;this.op=0;
    this.hue=252+Math.random()*32;
    this.age=0;
    // Pre-compute all arm positions at creation — no per-frame growth logic
    this.arms=[];
    const numArms=3+Math.floor(Math.random()*3);
    for(let i=0;i<numArms;i++){
      const arm=[];
      let ax=x,ay=y,angle=(i/numArms)*6.28+Math.random()*.5;
      const steps=4+Math.floor(Math.random()*5);
      for(let s=0;s<steps;s++){
        angle+=(Math.random()-.5)*.5;
        const dist=12+Math.random()*20;
        ax+=Math.cos(angle)*dist; ay+=Math.sin(angle)*dist;
        const depth=s/steps;
        arm.push({
          x:ax,y:ay,
          r:(1-depth)*(10+Math.random()*12)+3,
          hue:this.hue+s*5+(Math.random()-.5)*10,
          lit:18+s*8+Math.random()*8
        });
      }
      this.arms.push(arm);
    }
    // Total reveal time: 2 seconds
    this.revealFrames=120;
  }

  update(){
    this.age++;
    this.op=Math.min(.92,this.age/30);
  }

  draw(){
    const progress=Math.min(1,this.age/this.revealFrames);
    // Root puff
    puff(this.x,this.y,14*Math.min(1,this.age/20),this.hue,16,this.op);
    // Arms — reveal progressively
    this.arms.forEach(arm=>{
      const visible=Math.floor(arm.length*progress);
      let px=this.x,py=this.y;
      for(let s=0;s<visible;s++){
        const node=arm[s];
        const nodeAge=this.age-(s*this.revealFrames/arm.length/this.arms.length);
        const nodeOp=Math.min(this.op,Math.max(0,nodeAge/20));
        strand(px,py,node.x,node.y,node.hue,Math.max(.5,2.5-s*.3),nodeOp);
        puff(node.x,node.y,node.r*Math.min(1,nodeAge/15),node.hue,node.lit,nodeOp);
        px=node.x;py=node.y;
      }
    });
  }
}

// ── Spore particle ────────────────────────────────────────
class Spore{
  constructor(x,y){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*.9;this.vy=-(Math.random()*.7+.1);
    this.life=1;this.dc=.008+Math.random()*.008;
    this.r=.5+Math.random()*.8;this.hue=252+Math.random()*32;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;this.vy+=.007;this.life-=this.dc;
  }
  draw(){
    X.save();X.globalAlpha=this.life*.3;
    const g=X.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2);
    g.addColorStop(0,`hsl(${this.hue},65%,70%)`);g.addColorStop(1,'transparent');
    X.beginPath();X.arc(this.x,this.y,this.r*2,0,6.28);X.fillStyle=g;X.fill();X.restore();
  }
}

// ── State — hard cap to keep it fast ─────────────────────
const MAX_COLS=10;
let cols=[],spores=[],running=false;

function addColony(x,y){
  if(cols.length>=MAX_COLS) cols.shift(); // remove oldest
  cols.push(new Colony(x,y));
  for(let i=0;i<6;i++)
    spores.push(new Spore(x+(Math.random()-.5)*20,y+(Math.random()-.5)*20));
}

function seed(){
  [[.15,.5],[.5,.38],[.8,.48],[.3,.7],[.65,.6]].forEach((p,i)=>
    setTimeout(()=>addColony(C.width*p[0],C.height*p[1]),i*700+100));
}

function loop(){
  X.clearRect(0,0,C.width,C.height);
  // Vignette
  const vg=X.createRadialGradient(C.width/2,C.height/2,C.height*.05,C.width/2,C.height/2,C.height*.9);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,4,.22)');
  X.fillStyle=vg;X.fillRect(0,0,C.width,C.height);

  cols.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0);
  if(spores.length>60)spores=spores.slice(-60); // hard cap
  spores.forEach(s=>{s.update();s.draw();});

  requestAnimationFrame(loop);
}

// Touch
C.addEventListener('pointerdown',e=>{
  if(!running)return;
  e.preventDefault();
  addColony(e.clientX,e.clientY);
});

// Start
document.getElementById('btn').addEventListener('click',async()=>{
  try{
    const s=await navigator.mediaDevices.getUserMedia(
      {video:{facingMode:{ideal:'environment'}},audio:false});
    V.srcObject=s;await V.play();
  }catch(e){}
  const el=document.getElementById('s');
  el.style.transition='opacity .8s';el.style.opacity='0';
  setTimeout(()=>el.style.display='none',900);
  running=true;loop();seed();
});
</script>
</body>
</html>
