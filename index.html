<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;width:100vw;height:100vh;}
#glc{position:fixed;inset:0;width:100%;height:100%;z-index:1;}
#oc{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
#touch{position:fixed;inset:0;z-index:3;}
#hud{position:fixed;top:12px;left:14px;z-index:10;pointer-events:none;font-family:monospace;font-size:9px;color:#a855f755;letter-spacing:.1em;}
#start{position:fixed;inset:0;z-index:20;background:#04000e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity 1.2s;}
#start h1{font-family:serif;font-size:16vw;color:#a855f7;letter-spacing:.12em;text-shadow:0 0 50px #7c3aed,0 0 100px #4c1d95;animation:glow 3s ease-in-out infinite;}
@keyframes glow{0%,100%{text-shadow:0 0 50px #7c3aed,0 0 100px #4c1d95;}50%{text-shadow:0 0 80px #a855f7,0 0 150px #7c3aed;}}
#start p{color:#7c3aed66;font-size:10px;letter-spacing:.35em;font-family:monospace;}
#start button{background:none;border:1px solid #7c3aed55;color:#e9d5ff;font-family:monospace;font-size:11px;letter-spacing:.2em;padding:15px 40px;cursor:pointer;}
#start button:active{background:#7c3aed18;}
</style>
</head>
<body>
<canvas id="glc"></canvas>
<canvas id="oc"></canvas>
<div id="touch"></div>
<div id="hud">FUNGI AR · <span id="info">0 colonias</span></div>
<div id="start">
  <h1>FUNGI</h1>
  <p>AR · DETECCIÓN DE SUPERFICIES</p>
  <button id="btn">INICIAR INVASIÓN</button>
  <p style="opacity:.3;font-size:9px;">toca para sembrar</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// THREE.JS — Camera feed + GPU Sobel edge detection
// ═══════════════════════════════════════════════════════════
const glc = document.getElementById('glc');
const oc  = document.getElementById('oc');
const ctx = oc.getContext('2d');

let renderer, scene, camera, videoMesh, videoTexture;
let edgeScene, edgeCamera, edgeRT, edgeMesh;
let edgePixels; // read back from GPU
const EW = 160, EH = 90; // edge map resolution

function initThree(videoEl) {
  // Renderer
  renderer = new THREE.WebGLRenderer({ canvas: glc, alpha: false, antialias: false });
  renderer.setPixelRatio(1);
  renderer.setSize(window.innerWidth, window.innerHeight);

  // Main scene — just a full-screen camera quad
  scene  = new THREE.Scene();
  camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

  videoTexture = new THREE.VideoTexture(videoEl);
  videoTexture.minFilter = THREE.LinearFilter;
  videoTexture.magFilter = THREE.LinearFilter;

  const geo = new THREE.PlaneGeometry(2, 2);
  const mat = new THREE.MeshBasicMaterial({ map: videoTexture });
  videoMesh = new THREE.Mesh(geo, mat);
  scene.add(videoMesh);

  // Edge detection render target (small resolution)
  edgeRT = new THREE.WebGLRenderTarget(EW, EH, {
    minFilter: THREE.LinearFilter,
    magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat,
    type: THREE.UnsignedByteType
  });

  // Sobel shader scene
  edgeScene  = new THREE.Scene();
  edgeCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

  const sobelMat = new THREE.ShaderMaterial({
    uniforms: { tDiffuse: { value: videoTexture }, resolution: { value: new THREE.Vector2(EW, EH) } },
    vertexShader: `
      varying vec2 vUv;
      void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }
    `,
    fragmentShader: `
      uniform sampler2D tDiffuse;
      uniform vec2 resolution;
      varying vec2 vUv;
      float luma(vec3 c){ return dot(c, vec3(0.299, 0.587, 0.114)); }
      void main(){
        vec2 p = vec2(1.0) / resolution;
        float tl = luma(texture2D(tDiffuse, vUv + vec2(-p.x, p.y)).rgb);
        float tc = luma(texture2D(tDiffuse, vUv + vec2(0.0,  p.y)).rgb);
        float tr = luma(texture2D(tDiffuse, vUv + vec2( p.x, p.y)).rgb);
        float ml = luma(texture2D(tDiffuse, vUv + vec2(-p.x, 0.0)).rgb);
        float mr = luma(texture2D(tDiffuse, vUv + vec2( p.x, 0.0)).rgb);
        float bl = luma(texture2D(tDiffuse, vUv + vec2(-p.x,-p.y)).rgb);
        float bc = luma(texture2D(tDiffuse, vUv + vec2(0.0, -p.y)).rgb);
        float br = luma(texture2D(tDiffuse, vUv + vec2( p.x,-p.y)).rgb);
        float gx = -tl - 2.0*ml - bl + tr + 2.0*mr + br;
        float gy = -tl - 2.0*tc - tr + bl + 2.0*bc + br;
        float edge = clamp(sqrt(gx*gx + gy*gy) * 2.8, 0.0, 1.0);
        gl_FragColor = vec4(edge, edge, edge, 1.0);
      }
    `
  });
  const edgeGeo = new THREE.PlaneGeometry(2, 2);
  edgeMesh = new THREE.Mesh(edgeGeo, sobelMat);
  edgeScene.add(edgeMesh);

  // Buffer for reading edge pixels
  edgePixels = new Uint8Array(EW * EH * 4);

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    oc.width  = window.innerWidth;
    oc.height = window.innerHeight;
  });
}

function getEdge(sx, sy) {
  // Sample edge map (updated every N frames)
  const px = Math.max(0, Math.min(EW-1, Math.round(sx / window.innerWidth  * EW)));
  const py = Math.max(0, Math.min(EH-1, Math.round((1 - sy / window.innerHeight) * EH)));
  const i  = (py * EW + px) * 4;
  return edgePixels[i] / 255;
}

function nearEdge(x, y, r) {
  let bv = 0, bx = x, by = y;
  for (let i = 0; i < 32; i++) {
    const a = i/32*6.28, d = r*(.05 + Math.random()*.95);
    const tx = x + Math.cos(a)*d, ty = y + Math.sin(a)*d;
    const v = getEdge(tx, ty);
    if (v > bv) { bv = v; bx = tx; by = ty; }
  }
  return bv > 0.1 ? { x: bx, y: by } : { x, y };
}

// ═══════════════════════════════════════════════════════════
// CANVAS 2D — Coral + Tendril overlay
// ═══════════════════════════════════════════════════════════
function initCanvas() {
  oc.width  = window.innerWidth;
  oc.height = window.innerHeight;
}

// Draw coral cluster
function drawCluster(cx, cy, r, hue, lit, alpha) {
  if (r < 1 || alpha < .01) return;
  const n = Math.max(2, Math.round(r / 4.5));
  ctx.save();
  ctx.globalAlpha = alpha * .09;
  const g0 = ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.4);
  g0.addColorStop(0, `hsl(${hue},62%,${lit+5}%)`); g0.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(cx,cy,r*2.4,0,6.28); ctx.fillStyle=g0; ctx.fill();
  for (let i = 0; i < n; i++) {
    const la = (i/n)*6.28 + (cx*.008+cy*.005);
    const lr = r * (.3 + ((i*7919 + Math.round(cx*cy)) % 100)/100 * .38);
    const lx = cx + Math.cos(la)*r*.3, ly = cy + Math.sin(la)*r*.3;
    const ll = lit + 10 + ((i*37 + Math.round(cx)) % 20);
    ctx.globalAlpha = alpha * .75;
    const g = ctx.createRadialGradient(lx-lr*.22,ly-lr*.28,0,lx,ly,lr);
    g.addColorStop(0,   `hsl(${hue-10},50%,${Math.min(86,ll+26)}%)`);
    g.addColorStop(.45, `hsl(${hue},68%,${ll+8}%)`);
    g.addColorStop(.82, `hsl(${hue+14},60%,${ll}%)`);
    g.addColorStop(1,   `hsl(${hue+24},50%,${Math.max(8,ll-20)}%)`);
    ctx.beginPath();
    for (let p = 0; p <= 8; p++) {
      const pa = (p/8)*6.28;
      const pr = lr * (.74 + ((p*19+i*31+Math.round(cx))%12)/12 * .46);
      const px2 = lx+Math.cos(pa)*pr, py2 = ly+Math.sin(pa)*pr;
      p === 0 ? ctx.moveTo(px2,py2) : ctx.lineTo(px2,py2);
    }
    ctx.closePath(); ctx.fillStyle = g;
    ctx.shadowBlur = lr*.9; ctx.shadowColor = `hsl(${hue},78%,${lit+20}%)`;
    ctx.fill();
  }
  ctx.globalAlpha = alpha * .55;
  const gc = ctx.createRadialGradient(cx-r*.15,cy-r*.2,0,cx,cy,r*.6);
  gc.addColorStop(0, `hsl(${hue-14},42%,${Math.min(90,lit+42)}%)`);
  gc.addColorStop(.5, `hsl(${hue},55%,${lit+20}%)`); gc.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(cx,cy,r*.6,0,6.28); ctx.fillStyle=gc; ctx.fill();
  ctx.restore();
}

// Draw tendril path
function drawTendril(pts, hue, thick, alpha) {
  if (pts.length < 2 || alpha < .01) return;
  const lit = 42;
  ctx.save();
  ctx.globalAlpha = alpha * .6;
  ctx.strokeStyle = `hsl(${hue},78%,${lit+8}%)`;
  ctx.lineWidth = thick * 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.shadowBlur = thick * 6; ctx.shadowColor = `hsl(${hue},92%,${lit+22}%)`;
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    if (i < pts.length-1) {
      const mx=(pts[i].x+pts[i+1].x)/2, my=(pts[i].y+pts[i+1].y)/2;
      ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
    } else ctx.lineTo(pts[i].x,pts[i].y);
  }
  ctx.stroke();
  ctx.globalAlpha = alpha * .9;
  ctx.strokeStyle = `hsl(${hue-6},52%,${Math.min(90,lit+34)}%)`;
  ctx.lineWidth = thick * .55; ctx.shadowBlur = thick * 2; ctx.stroke();
  ctx.restore();
}

// ── Tendril walker — GPU edge-guided ─────────────────────
class Tendril {
  constructor(x, y, angle, col, depth) {
    this.x=x; this.y=y; this.a=angle; this.col=col; this.d=depth;
    this.pts=[{x,y}]; this.len=0;
    this.maxLen = Math.max(20, 60 + Math.random()*60 - depth*8);
    this.sz = 2.5 + Math.random()*2;
    this.alive = true;
    this.spawnAt = 16 + Math.floor(Math.random()*16);
    this.spawned = false;
    this.hue = col.hue + depth*5 + (Math.random()-.5)*14;
    this.thick = Math.max(1, 3.0 - depth*.35);
    this.wgl = 0;
  }
  advance() {
    if (!this.alive) return;
    if (this.len >= this.maxLen) { this.alive=false; return; }
    // Steer toward GPU edges
    let bS=-1, bA=this.a;
    for (let c=0; c<9; c++) {
      const sp=(c/8-.5)*.95, ta=this.a+sp;
      const tx=this.x+Math.cos(ta)*this.sz*2;
      const ty=this.y+Math.sin(ta)*this.sz*2;
      if(tx<2||tx>oc.width-2||ty<2||ty>oc.height-2) continue;
      const e = getEdge(tx, ty);
      const score = e*.72 + Math.cos(sp)*.18 + Math.random()*.1;
      if (score > bS) { bS=score; bA=ta; }
    }
    this.wgl += (bA-this.a)*.42; this.wgl *= .68;
    this.a += this.wgl*.5 + (Math.random()-.5)*.04;
    this.x += Math.cos(this.a)*this.sz;
    this.y += Math.sin(this.a)*this.sz;
    this.len += this.sz;
    this.pts.push({x:this.x, y:this.y});
    if (!this.spawned && this.len >= this.spawnAt) {
      this.spawned = true;
      if (this.d < 5 && this.col.tendrils.length < this.col.maxT) {
        const n = this.d < 2 ? (Math.random()<.6?2:1) : 1;
        for (let i=0;i<n;i++) {
          const da = (Math.random()-.5)*(this.d<2?.85:1.1);
          this.col.tendrils.push(new Tendril(this.x,this.y,this.a+da,this.col,this.d+1));
        }
      }
      if (this.col.nodes.length < this.col.maxN) {
        this.col.nodes.push({
          x:this.x, y:this.y, r:0,
          tr:(this.d===0?20:this.d===1?13:this.d===2?9:this.d===3?6:4)+Math.random()*5,
          hue:this.hue, lit:18+this.d*8, op:0, gr:.15+Math.random()*.18
        });
      }
    }
    if(this.x<1||this.x>oc.width-1||this.y<1||this.y>oc.height-1) this.alive=false;
  }
}

// ── Colony ────────────────────────────────────────────────
class Colony {
  constructor(x, y) {
    const s = nearEdge(x, y, 85);
    this.x=s.x; this.y=s.y; this.op=0; this.age=0;
    this.hue = 250 + Math.random()*35;
    this.tendrils=[]; this.nodes=[];
    this.maxT = 30 + Math.floor(Math.random()*22);
    this.maxN = 20 + Math.floor(Math.random()*18);
    this.spt = 50 + Math.random()*40;
    const arms = 3 + Math.floor(Math.random()*3);
    for (let i=0;i<arms;i++)
      this.tendrils.push(new Tendril(this.x,this.y,(i/arms)*6.28+Math.random()*.5,this,0));
    this.nodes.push({x:this.x,y:this.y,r:0,tr:22+Math.random()*10,hue:this.hue,lit:16,op:0,gr:.18});
  }
  update() {
    this.age++; this.op=Math.min(.95,this.op+.008);
    this.tendrils.forEach(t=>t.advance());
    this.nodes.forEach(n=>{
      n.op=Math.min(1,n.op+.04);
      if(n.r<n.tr) n.r=Math.min(n.tr,n.r+n.gr);
    });
    this.spt--;
    if (this.spt<=0 && this.nodes.length>1) {
      this.spt = 35+Math.random()*35;
      const src = this.nodes[Math.floor(Math.random()*this.nodes.length)];
      for(let i=0;i<3;i++) spores.push(new Spore(src.x,src.y));
    }
  }
  draw() {
    [...this.nodes].sort((a,b)=>b.tr-a.tr).forEach(n=>{
      if(n.r<1||n.op<.01) return;
      drawCluster(n.x,n.y,n.r*n.op,n.hue,n.lit,this.op*n.op);
    });
    this.tendrils.forEach(t=>drawTendril(t.pts,t.hue,t.thick,this.op));
  }
}

class Spore {
  constructor(x,y){
    this.x=x;this.y=y;this.vx=(Math.random()-.5)*1.1;this.vy=-(Math.random()*.8+.1);
    this.life=1;this.dc=.004+Math.random()*.005;this.r=.5+Math.random()*1.1;this.hue=250+Math.random()*35;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;this.vy+=.009;this.life-=this.dc;
    if(this.life<.18&&Math.random()<.004&&cols.length<18){
      cols.push(new Colony(this.x,this.y));this.life=0;
    }
  }
  draw(){
    ctx.save();ctx.globalAlpha=this.life*.28;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2);
    g.addColorStop(0,`hsl(${this.hue},65%,68%)`);g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*2,0,6.28);ctx.fillStyle=g;ctx.fill();ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════
let cols=[], spores=[], running=false, fN=0, autoT=0;
let edgeUpdateReady = false;

function seed(){
  [[.15,.5],[.5,.4],[.82,.48],[.3,.72],[.65,.62]].forEach((p,i)=>{
    setTimeout(()=>cols.push(new Colony(oc.width*p[0],oc.height*p[1])),i*600+100);
  });
}

function autoSeed(){
  if(cols.length>=18) return;
  // Try to find a high-edge spot
  let placed=false;
  for(let t=0;t<80;t++){
    const x=oc.width*(.05+Math.random()*.9);
    const y=oc.height*(.1+Math.random()*.8);
    if(getEdge(x,y)>.25){ cols.push(new Colony(x,y)); placed=true; break; }
  }
  if(!placed) cols.push(new Colony(oc.width*(.1+Math.random()*.8),oc.height*(.35+Math.random()*.5)));
}

function loop(){
  fN++;

  // ── GPU: render edge map every 8 frames ──
  if(fN%8===0 && renderer){
    renderer.setRenderTarget(edgeRT);
    renderer.render(edgeScene, edgeCamera);
    renderer.readRenderTargetPixels(edgeRT,0,0,EW,EH,edgePixels);
    renderer.setRenderTarget(null);
  }

  // ── GPU: render camera feed to screen ──
  if(renderer) renderer.render(scene, camera);

  // ── CPU: overlay canvas ──
  ctx.clearRect(0,0,oc.width,oc.height);
  const vg=ctx.createRadialGradient(oc.width/2,oc.height/2,oc.height*.05,oc.width/2,oc.height/2,oc.height*.9);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,3,.25)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,oc.width,oc.height);

  cols.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0); spores.forEach(s=>{s.update();s.draw();});

  autoT++; if(autoT>110){autoT=0;autoSeed();}
  document.getElementById('info').textContent=cols.length+' colonias';

  requestAnimationFrame(loop);
}

document.getElementById('touch').addEventListener('pointerdown',e=>{
  if(!running) return;
  cols.push(new Colony(e.clientX, e.clientY));
  for(let i=0;i<10;i++) spores.push(new Spore(e.clientX+(Math.random()-.5)*15,e.clientY));
});

document.getElementById('btn').addEventListener('click', async()=>{
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
      audio:false
    });
    const videoEl = document.createElement('video');
    videoEl.srcObject=stream; videoEl.autoplay=true; videoEl.playsInline=true; videoEl.muted=true;
    await videoEl.play();
    initCanvas();
    initThree(videoEl);
  } catch(e){
    // No camera — still run overlay
    initCanvas();
  }
  const el=document.getElementById('start');
  el.style.opacity='0'; setTimeout(()=>el.style.display='none',1200);
  running=true; loop(); seed();
});
</script>
</body>
</html>
