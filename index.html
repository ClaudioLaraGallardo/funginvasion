<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;width:100vw;height:100vh;touch-action:none;}
  #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
  #canvas{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
  #touch{position:fixed;inset:0;z-index:3;}
  #ecv,#scv{position:fixed;display:none;}
  #hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:14px 16px;display:flex;justify-content:space-between;}
  .ht{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,5vw,28px);letter-spacing:.2em;color:#b084e8;text-shadow:0 0 14px #7c3aed44;line-height:1;}
  .hs{font-family:'Space Mono',monospace;font-size:7px;color:#7c3aed30;letter-spacing:.18em;margin-top:2px;}
  .hr{font-family:'Space Mono',monospace;font-size:8px;color:#a855f730;letter-spacing:.07em;line-height:1.9;text-align:right;}
  #bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:flex;align-items:center;gap:8px;}
  .bl{font-family:'Space Mono',monospace;font-size:7px;color:#7c3aed40;letter-spacing:.14em;white-space:nowrap;}
  .bt{width:80px;height:1px;background:#7c3aed12;}
  .bf{height:100%;background:linear-gradient(90deg,#2e1065,#a855f7);box-shadow:0 0 4px #7c3aed;width:0%;transition:width .5s;}
  .bp{font-family:'Space Mono',monospace;font-size:7px;color:#a855f740;width:24px;}
  #start{position:fixed;inset:0;z-index:20;background:radial-gradient(ellipse at 50% 60%,#08011a 0%,#010004 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 1.4s;}
  #bgc{position:absolute;inset:0;pointer-events:none;}
  .si{position:relative;z-index:2;text-align:center;padding:32px;}
  .si h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(68px,18vw,110px);color:#a855f7;letter-spacing:.14em;line-height:.85;text-shadow:0 0 50px #7c3aed77,0 0 100px #4c1d9533;animation:gl 3.5s ease-in-out infinite;}
  @keyframes gl{0%,100%{text-shadow:0 0 50px #7c3aed77,0 0 100px #4c1d9533;}50%{text-shadow:0 0 80px #a855f7aa,0 0 140px #7c3aed55;}}
  .si .sub{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.35em;color:#7c3aed33;margin:5px 0 40px;}
  .btn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;color:#e9d5ff;background:transparent;border:1px solid #7c3aed28;padding:15px 38px;cursor:pointer;transition:all .3s;}
  .btn:hover,.btn:active{border-color:#a855f7;background:#7c3aed0a;}
  .hint{font-family:'Space Mono',monospace;font-size:7px;color:#7c3aed22;letter-spacing:.2em;margin-top:16px;}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="ecv"></canvas><canvas id="scv"></canvas>
<canvas id="canvas"></canvas>
<div id="touch"></div>
<div id="hud">
  <div><div class="ht">FUNGI</div><div class="hs">SURFACE AR</div></div>
  <div class="hr">COL: <span id="sc">0</span><br>BROTES: <span id="sm">0</span><br>COB: <span id="sv">0</span>%</div>
</div>
<div id="bar">
  <span class="bl">INFECCIÓN</span>
  <div class="bt"><div class="bf" id="bf"></div></div>
  <span class="bp" id="bp">0%</span>
</div>
<div id="start">
  <canvas id="bgc"></canvas>
  <div class="si">
    <h1>FUNGI</h1>
    <p class="sub">AR · COLONIZACIÓN MICELIAL</p>
    <button class="btn" id="startBtn">INICIAR INVASIÓN</button>
    <p class="hint">TOCA PARA SEMBRAR · SE ADAPTA A SUPERFICIES</p>
  </div>
</div>

<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const video=document.getElementById('video');
const ecv=document.getElementById('ecv'),scv=document.getElementById('scv');
const sctx=scv.getContext('2d',{willReadFrequently:true});
const PW=120,PH=68; // smaller = faster edge detection
ecv.width=PW;ecv.height=PH;scv.width=PW;scv.height=PH;
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// ── Pre-render coral stamp library ────────────────────────
// We create a set of offscreen canvases with organic coral shapes
// then just drawImage() them at runtime — very fast
const STAMP_COUNT = 24;
const STAMP_SIZES = [8,12,16,22,30,40]; // px radii
const stamps = []; // stamps[sizeIdx][stampIdx] = {canvas, hue, lit}

// Build one stamp: organic multi-lobe shape on offscreen canvas
function buildStamp(radius, hue, lit){
  const sz = radius*3;
  const oc = document.createElement('canvas');
  oc.width=sz; oc.height=sz;
  const ox=oc.getContext('2d');
  const cx=sz/2, cy=sz/2;

  // Outer glow
  const gGlow=ox.createRadialGradient(cx,cy,0,cx,cy,sz/2);
  gGlow.addColorStop(0,`hsla(${hue},70%,${lit+5}%,0.15)`);
  gGlow.addColorStop(1,'transparent');
  ox.beginPath();ox.arc(cx,cy,sz/2,0,Math.PI*2);
  ox.fillStyle=gGlow;ox.fill();

  // 3–5 irregular lobes
  const lobes=3+Math.floor(Math.random()*3);
  for(let l=0;l<lobes;l++){
    const la=(l/lobes)*Math.PI*2+Math.random()*.5;
    const lr=radius*(0.4+Math.random()*.35);
    const lx=cx+Math.cos(la)*radius*.32;
    const ly=cy+Math.sin(la)*radius*.32;
    const lobeLit=lit+8+Math.random()*18;
    const g=ox.createRadialGradient(lx-lr*.2,ly-lr*.25,0,lx,ly,lr*1.1);
    g.addColorStop(0,`hsl(${hue-10},52%,${Math.min(88,lobeLit+28)}%)`);
    g.addColorStop(0.4,`hsl(${hue},62%,${lobeLit+8}%)`);
    g.addColorStop(0.8,`hsl(${hue+12},58%,${Math.max(12,lobeLit-8)}%)`);
    g.addColorStop(1,`hsl(${hue+20},48%,${Math.max(5,lobeLit-22)}%)`);

    // Irregular lobe path (pre-computed polygon)
    ox.beginPath();
    const pts=10;
    const rands=Array.from({length:pts},()=>0.75+Math.random()*.5);
    for(let p=0;p<=pts;p++){
      const pa=(p/pts)*Math.PI*2;
      const r2=lr*rands[p%pts];
      ox.lineTo(lx+Math.cos(pa)*r2, ly+Math.sin(pa)*r2);
    }
    ox.closePath();
    ox.fillStyle=g;
    ox.shadowBlur=lr*.7;ox.shadowColor=`hsl(${hue},75%,${lit+18}%)`;
    ox.fill();
  }

  // Central cap highlight
  const cg=ox.createRadialGradient(cx-radius*.12,cy-radius*.18,0,cx,cy,radius*.65);
  cg.addColorStop(0,`hsla(${hue-15},40%,${Math.min(90,lit+42)}%,0.7)`);
  cg.addColorStop(.5,`hsla(${hue},55%,${lit+18}%,0.5)`);
  cg.addColorStop(1,'transparent');
  ox.beginPath();ox.arc(cx,cy,radius*.65,0,Math.PI*2);
  ox.fillStyle=cg;ox.fill();

  return oc;
}

// Pre-build stamp library for different hue/lit combos and sizes
// Hue bands: deep blue-violet (245) → violet (270) → lila (290)
const HUE_BANDS = [
  {hue:245, lit:15}, // dark base
  {hue:258, lit:22},
  {hue:268, lit:30},
  {hue:275, lit:40},
  {hue:280, lit:52},
  {hue:285, lit:62}, // bright tip
];

const stampLib = {}; // key: `${sizeIdx}_${hueIdx}` → array of canvases
function buildLibrary(){
  HUE_BANDS.forEach((band,hi)=>{
    STAMP_SIZES.forEach((r,si)=>{
      const key=`${si}_${hi}`;
      stampLib[key]=[];
      for(let v=0;v<4;v++){ // 4 variants per combo
        stampLib[key].push(buildStamp(r, band.hue+Math.random()*10-5, band.lit+Math.random()*8-4));
      }
    });
  });
}
buildLibrary();

function getStamp(radius, depthFrac){
  // depthFrac: 0=base, 1=tip
  const si=Math.min(STAMP_SIZES.length-1, Math.round(radius/7));
  const hi=Math.min(HUE_BANDS.length-1, Math.round(depthFrac*(HUE_BANDS.length-1)));
  const key=`${si}_${hi}`;
  const arr=stampLib[key];
  return arr[Math.floor(Math.random()*arr.length)];
}

// ── Edge map ──────────────────────────────────────────────
let edgeMap=new Float32Array(PW*PH),edgeReady=false,frameN=0;
function updateEdges(){
  if(video.readyState<2)return;
  sctx.drawImage(video,0,0,PW,PH);
  const d=sctx.getImageData(0,0,PW,PH).data;
  const g=new Float32Array(PW*PH);
  for(let i=0;i<PW*PH;i++)g[i]=(d[i*4]*.299+d[i*4+1]*.587+d[i*4+2]*.114)/255;
  const n=new Float32Array(PW*PH);
  for(let y=1;y<PH-1;y++)for(let x=1;x<PW-1;x++){
    const i=y*PW+x;
    const gx=-g[i-PW-1]+g[i-PW+1]-2*g[i-1]+2*g[i+1]-g[i+PW-1]+g[i+PW+1];
    const gy=-g[i-PW-1]-2*g[i-PW]-g[i-PW+1]+g[i+PW-1]+2*g[i+PW]+g[i+PW+1];
    n[i]=Math.min(1,Math.sqrt(gx*gx+gy*gy)*3.5);
  }
  for(let i=0;i<PW*PH;i++)edgeMap[i]=edgeMap[i]*.25+n[i]*.75;
  edgeReady=true;
}
function eAt(sx,sy){
  if(!edgeReady)return 0;
  const px=Math.max(0,Math.min(PW-1,Math.round(sx/canvas.width*PW)));
  const py=Math.max(0,Math.min(PH-1,Math.round(sy/canvas.height*PH)));
  return edgeMap[py*PW+px];
}
function nearEdge(sx,sy,r=100){
  let bv=0,bx=sx,by=sy;
  for(let i=0;i<36;i++){
    const a=i/36*Math.PI*2,d=r*(.05+Math.random()*.95);
    const tx=sx+Math.cos(a)*d,ty=sy+Math.sin(a)*d;
    const v=eAt(tx,ty);
    if(v>bv){bv=v;bx=tx;by=ty;}
  }
  return{x:bx,y:by,e:bv};
}

// ── Node ──────────────────────────────────────────────────
class Node{
  constructor(x,y,col,depth){
    this.x=x;this.y=y;this.col=col;this.depth=depth;
    this.maxDepth=col.maxDepth;
    this.r=0;
    const base=depth===0?18:depth===1?12:depth===2?8:depth===3?5:3.5;
    this.targetR=base+Math.random()*base*.7;
    this.targetR=Math.max(3,this.targetR);
    this.growSpeed=0.2+Math.random()*0.25;
    this.depthFrac=depth/this.maxDepth;
    this.stamp=getStamp(this.targetR, this.depthFrac);
    this.age=0;
    this.opacity=0;
    this.childTimer=18+Math.floor(Math.random()*28);
    this.maxCh=depth<1?4:depth<3?3:depth<5?2:1;
    this.chCount=0;
    this.spawnDir=Math.random()*Math.PI*2;
    this.grown=false;
    // tendrils as simple line data (no objects)
    this.childData=[]; // {x1,y1,x2,y2,t,hueIdx}
  }
  update(){
    this.age++;
    this.opacity=Math.min(1,this.opacity+0.05);
    if(!this.grown){
      this.r=Math.min(this.targetR,this.r+this.growSpeed);
      if(this.r>=this.targetR)this.grown=true;
    }
    this.childData.forEach(c=>{c.t=Math.min(1,c.t+.04);});
    this.childTimer--;
    if(this.childTimer<=0&&this.chCount<this.maxCh&&this.col.nodes.length<this.col.maxNodes&&this.r>this.targetR*.5){
      this.childTimer=16+Math.floor(Math.random()*25);
      this.trySpawn();
    }
  }
  trySpawn(){
    this.chCount++;
    let bS=-1,bx=this.x,by=this.y,ba=this.spawnDir;
    const spread=this.depth<2?.85:1.1;
    for(let t=0;t<20;t++){
      const a=this.spawnDir+(Math.random()-.5)*spread*2;
      const dist=this.r*.65+this.targetR*.4+Math.random()*this.targetR*.5;
      const tx=this.x+Math.cos(a)*dist,ty=this.y+Math.sin(a)*dist;
      if(tx<2||tx>canvas.width-2||ty<2||ty>canvas.height-2)continue;
      const e=eAt(tx,ty);
      const sc=e*.68+Math.random()*.32;
      if(sc>bS){bS=sc;bx=tx;by=ty;ba=a;}
    }
    this.spawnDir=ba+(Math.random()-.5)*.6;
    const child=new Node(bx,by,this.col,this.depth+1);
    this.col.nodes.push(child);
    this.childData.push({x2:bx,y2:by,t:0,hi:Math.min(HUE_BANDS.length-1,this.depth+1)});
  }
  draw(){
    // Draw tendrils (thin lines — very cheap)
    this.childData.forEach(c=>{
      if(c.t<.02)return;
      const band=HUE_BANDS[c.hi];
      ctx.save();
      ctx.globalAlpha=this.col.opacity*this.opacity*c.t*.55;
      ctx.strokeStyle=`hsl(${band.hue},60%,${band.lit+15}%)`;
      ctx.lineWidth=Math.max(.4,1.5-this.depth*.2);
      ctx.lineCap='round';
      ctx.shadowBlur=3;ctx.shadowColor=`hsl(${band.hue},75%,${band.lit+20}%)`;
      // draw partial line up to t
      const ex=this.x+(c.x2-this.x)*c.t, ey=this.y+(c.y2-this.y)*c.t;
      ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(ex,ey);ctx.stroke();
      ctx.restore();
    });

    // Draw stamp (pre-rendered coral shape — just drawImage, very fast)
    if(this.r<1||!this.stamp)return;
    const sc=this.r*2/this.stamp.width*3; // scale to current radius
    const sw=this.stamp.width*sc, sh=this.stamp.height*sc;
    ctx.save();
    ctx.globalAlpha=this.col.opacity*this.opacity;
    ctx.drawImage(this.stamp, this.x-sw/2, this.y-sh/2, sw, sh);
    ctx.restore();
  }
}

// ── Colony ────────────────────────────────────────────────
class Colony{
  constructor(x,y){
    const anch=nearEdge(x,y,110);
    this.x=anch.e>0.1?anch.x:x;
    this.y=anch.e>0.1?anch.y:y;
    this.opacity=0;
    this.nodes=[];
    this.age=0;
    this.maxNodes=30+Math.floor(Math.random()*35);
    this.maxDepth=6;
    this.sporeTimer=60+Math.random()*70;
    this.nodes.push(new Node(this.x,this.y,this,0));
  }
  update(){
    this.age++;
    this.opacity=Math.min(0.96,this.opacity+0.008);
    this.nodes.forEach(n=>n.update());
    this.sporeTimer--;
    if(this.sporeTimer<=0&&this.nodes.length>3){
      this.sporeTimer=45+Math.random()*55;
      const src=this.nodes[Math.floor(Math.random()*this.nodes.length)];
      for(let i=0;i<2+Math.floor(Math.random()*3);i++)spores.push(new Spore(src.x,src.y));
      if(Math.random()<.15)clouds.push(new Cloud(src.x,src.y));
    }
  }
  draw(){
    // depth sort: large (deep) nodes first
    const sorted=[...this.nodes].sort((a,b)=>b.targetR-a.targetR);
    sorted.forEach(n=>n.draw());
  }
  get brotes(){return this.nodes.length;}
}

// ── Spore ─────────────────────────────────────────────────
class Spore{
  constructor(x,y){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*1.4;this.vy=-(0.05+Math.random()*1.2);
    this.life=1;this.decay=.003+Math.random()*.005;
    this.r=.4+Math.random()*1.4;this.hue=248+Math.random()*45;this.landed=false;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.009;this.vx+=(Math.random()-.5)*.02;
    this.life-=this.decay;
    if(!this.landed&&this.life<.2&&Math.random()<.003&&colonies.length<18){
      if(eAt(this.x,this.y)>0.07||Math.random()<.12){
        colonies.push(new Colony(this.x,this.y));this.landed=true;
      }
    }
  }
  draw(){
    ctx.save();ctx.globalAlpha=this.life*.4;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2);
    g.addColorStop(0,`hsl(${this.hue},68%,72%)`);g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*2,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();ctx.restore();
  }
}
class Cloud{
  constructor(x,y){
    this.x=x+(Math.random()-.5)*30;this.y=y;
    this.r=5+Math.random()*30;
    this.vx=(Math.random()-.5)*.15;this.vy=-(0.03+Math.random()*.18);
    this.life=.25+Math.random()*.35;this.decay=.0006+Math.random()*.0013;
    this.hue=248+Math.random()*38;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.r+=.05;this.life-=this.decay;}
  draw(){
    ctx.save();ctx.globalAlpha=this.life*.08;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,`hsla(${this.hue},48%,42%,1)`);g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();ctx.restore();
  }
}

let colonies=[],spores=[],clouds=[],running=false,autoT=0;

function seedInitial(){
  const n=2+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const x=canvas.width*(.1+Math.random()*.8);
      const y=canvas.height*(.38+Math.random()*.48);
      colonies.push(new Colony(x,y));
      for(let j=0;j<4;j++)spores.push(new Spore(x+(Math.random()-.5)*12,y));
    },i*1200+Math.random()*400);
  }
}
function autoSeed(){
  if(!edgeReady||colonies.length>=16)return;
  let p=0;
  for(let t=0;t<120&&p<2;t++){
    const px=Math.random()*PW,py=Math.random()*PH;
    if(edgeMap[Math.round(py)*PW+Math.round(px)]>.32||(colonies.length<2&&Math.random()<.05)){
      colonies.push(new Colony(px/PW*canvas.width,py/PH*canvas.height));p++;
    }
  }
}
function drawVig(){
  const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*.06,canvas.width/2,canvas.height/2,canvas.height*.9);
  g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(0,0,2,.38)');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
}
function updateHUD(){
  const mass=colonies.reduce((a,c)=>a+c.brotes,0);
  const cov=Math.min(100,colonies.length*6+mass*.55);
  document.getElementById('sc').textContent=colonies.length;
  document.getElementById('sm').textContent=mass;
  document.getElementById('sv').textContent=Math.round(cov);
  document.getElementById('bf').style.width=cov+'%';
  document.getElementById('bp').textContent=Math.round(cov)+'%';
}
function loop(){
  frameN++;
  if(frameN%12===0)updateEdges();
  autoT++;if(autoT>130){autoT=0;autoSeed();}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawVig();
  clouds=clouds.filter(c=>c.life>0);clouds.forEach(c=>{c.update();c.draw();});
  colonies.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0);spores.forEach(s=>{s.update();s.draw();});
  updateHUD();
  requestAnimationFrame(loop);
}
document.getElementById('touch').addEventListener('pointerdown',e=>{
  if(!running)return;
  colonies.push(new Colony(e.clientX,e.clientY));
  for(let i=0;i<12;i++)spores.push(new Spore(e.clientX+(Math.random()-.5)*16,e.clientY));
  for(let i=0;i<3;i++)clouds.push(new Cloud(e.clientX,e.clientY));
});
async function startCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});
    video.srcObject=s;await video.play();return true;
  }catch{
    try{const s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});video.srcObject=s;await video.play();return true;}
    catch{return false;}
  }
}
const bgc=document.getElementById('bgc'),bctx=bgc.getContext('2d');
bgc.width=window.innerWidth;bgc.height=window.innerHeight;
const bgP=Array.from({length:50},()=>({x:Math.random()*bgc.width,y:Math.random()*bgc.height,r:.3+Math.random()*1.5,vx:(Math.random()-.5)*.2,vy:-(0.03+Math.random()*.28),life:Math.random(),decay:.001+Math.random()*.002,hue:248+Math.random()*45}));
let bgR=true;
function animBg(){
  if(!bgR)return;
  bctx.clearRect(0,0,bgc.width,bgc.height);
  bgP.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<0){p.life=.7+Math.random()*.4;p.y=bgc.height+5;p.x=Math.random()*bgc.width;}
    bctx.save();bctx.globalAlpha=p.life*.38;
    const g=bctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.2);
    g.addColorStop(0,`hsl(${p.hue},78%,62%)`);g.addColorStop(1,'transparent');
    bctx.beginPath();bctx.arc(p.x,p.y,p.r*2.2,0,Math.PI*2);
    bctx.fillStyle=g;bctx.fill();bctx.restore();
  });
  requestAnimationFrame(animBg);
}
animBg();
document.getElementById('startBtn').addEventListener('click',async()=>{
  await startCam();bgR=false;
  const s=document.getElementById('start');
  s.style.opacity='0';setTimeout(()=>{s.style.display='none';},1400);
  running=true;loop();seedInitial();
});
</script>
