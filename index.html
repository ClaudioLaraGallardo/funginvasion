<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
#v{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#c{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
#t{position:fixed;inset:0;z-index:3;}
#s{position:fixed;inset:0;z-index:20;background:#05000f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity 1s;}
#s h1{font-family:serif;font-size:15vw;color:#a855f7;letter-spacing:.1em;text-shadow:0 0 40px #7c3aed;}
#s p{color:#7c3aed88;font-size:11px;letter-spacing:.3em;font-family:monospace;}
#s button{background:none;border:1px solid #7c3aed55;color:#e9d5ff;font-family:monospace;font-size:11px;letter-spacing:.2em;padding:14px 36px;cursor:pointer;}
#hud{position:fixed;top:12px;left:14px;z-index:10;pointer-events:none;font-family:monospace;font-size:9px;color:#a855f755;letter-spacing:.1em;}
#inf{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-family:monospace;font-size:8px;color:#7c3aed44;letter-spacing:.2em;}
</style>
</head>
<body>
<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="t"></div>
<div id="hud">FUNGI AR<br><span id="info">0 colonias</span></div>
<div id="inf">TOCA PARA SEMBRAR</div>
<div id="s">
  <h1>FUNGI</h1>
  <p>AR · COLONIZACIÓN MICELIAL</p>
  <button id="btn">INICIAR INVASIÓN</button>
  <p style="font-size:9px;opacity:.4">Se adapta a las superficies</p>
</div>

<script>
// ── Minimal setup ─────────────────────────────────────────
const C = document.getElementById('c');
const X = C.getContext('2d');
const V = document.getElementById('v');
const SC = document.getElementById('scv') || (() => {
  const el = document.createElement('canvas');
  el.width = 80; el.height = 45;
  return el;
})();
const SX = SC.getContext('2d', {willReadFrequently: true});
SC.width = 80; SC.height = 45;

W = () => C.width = window.innerWidth;
H = () => C.height = window.innerHeight;
W(); H();
window.addEventListener('resize', () => { W(); H(); });

// ── Edge detection (tiny 80x45) ───────────────────────────
let emap = new Float32Array(80 * 45);
let eready = false;
function edges() {
  if (V.readyState < 2) return;
  SX.drawImage(V, 0, 0, 80, 45);
  const d = SX.getImageData(0, 0, 80, 45).data;
  const g = new Float32Array(80 * 45);
  for (let i = 0; i < 3600; i++) g[i] = (d[i*4]*.3 + d[i*4+1]*.59 + d[i*4+2]*.11) / 255;
  for (let y = 1; y < 44; y++) for (let x = 1; x < 79; x++) {
    const i = y*80+x;
    const gx = -g[i-81]+g[i-79]-2*g[i-1]+2*g[i+1]-g[i+79]+g[i+81];
    const gy = -g[i-81]-2*g[i-80]-g[i-79]+g[i+79]+2*g[i+80]+g[i+81];
    emap[i] = emap[i]*.3 + Math.min(1, Math.sqrt(gx*gx+gy*gy)*3) * .7;
  }
  eready = true;
}
function eat(sx, sy) {
  if (!eready) return 0;
  const px = Math.max(0, Math.min(79, Math.round(sx / C.width * 80)));
  const py = Math.max(0, Math.min(44, Math.round(sy / C.height * 45)));
  return emap[py*80+px];
}

// ── Find best nearby edge point ───────────────────────────
function snapped(x, y, r) {
  let bv = 0, bx = x, by = y;
  for (let i = 0; i < 24; i++) {
    const a = i/24*Math.PI*2, d = r*(.1+Math.random()*.9);
    const tx = x+Math.cos(a)*d, ty = y+Math.sin(a)*d;
    const v = eat(tx, ty);
    if (v > bv) { bv = v; bx = tx; by = ty; }
  }
  return bv > 0.1 ? {x:bx, y:by} : {x, y};
}

// ── Draw one organic coral lump (fast — just 2 arc calls) ─
function lump(x, y, r, hue, lit, a) {
  if (r < 1) return;
  X.save();
  X.globalAlpha = a;

  // Soft outer glow
  const g1 = X.createRadialGradient(x, y, 0, x, y, r*2.2);
  g1.addColorStop(0, `hsla(${hue},65%,${lit}%,.18)`);
  g1.addColorStop(1, 'transparent');
  X.beginPath(); X.arc(x, y, r*2.2, 0, 6.28);
  X.fillStyle = g1; X.fill();

  // Dense core with off-center highlight (gives 3D feel)
  const g2 = X.createRadialGradient(x-r*.22, y-r*.28, r*.05, x, y, r);
  g2.addColorStop(0, `hsl(${hue-12},52%,${Math.min(88,lit+35)}%)`);
  g2.addColorStop(.38, `hsl(${hue},68%,${lit+12}%)`);
  g2.addColorStop(.75, `hsl(${hue+15},62%,${lit}%)`);
  g2.addColorStop(1, `hsl(${hue+25},55%,${Math.max(8,lit-20)}%)`);
  X.beginPath(); X.arc(x, y, r, 0, 6.28);
  X.fillStyle = g2;
  X.shadowBlur = r*.9;
  X.shadowColor = `hsl(${hue},75%,${lit+10}%)`;
  X.fill();
  X.restore();
}

// ── Coral cluster: many overlapping lumps = dense mass ────
function cluster(cx, cy, radius, hue, baselit, alpha) {
  const n = Math.max(3, Math.round(radius / 5));
  // Back lumps (darker, larger)
  for (let i = 0; i < n; i++) {
    const a = (i/n)*6.28 + Math.random()*.8;
    const r = radius*(.3+Math.random()*.45);
    const ox = Math.cos(a)*radius*.35, oy = Math.sin(a)*radius*.35;
    lump(cx+ox, cy+oy, r, hue+10, baselit-8, alpha*.7);
  }
  // Middle layer
  for (let i = 0; i < Math.ceil(n*.7); i++) {
    const a = (i/n)*6.28 + Math.random()*.6;
    const r = radius*(.25+Math.random()*.35);
    const ox = Math.cos(a)*radius*.18, oy = Math.sin(a)*radius*.18;
    lump(cx+ox, cy+oy, r, hue+5, baselit+6, alpha*.85);
  }
  // Front center cap (lightest)
  lump(cx, cy, radius*.45, hue-5, baselit+22, alpha*.9);
}

// ── Node ──────────────────────────────────────────────────
class Node {
  constructor(x, y, col, depth) {
    this.x=x; this.y=y; this.col=col; this.d=depth;
    const b = [20,13,8,5,3.5][Math.min(depth,4)];
    this.tr = b + Math.random()*b*.6;
    this.r = 0; this.gr = .18+Math.random()*.22;
    // Color: deep blue-violet base → lila tips (matches reference)
    this.hue = 248 + depth*7 + (Math.random()-.5)*10;
    this.lit = 18 + depth*8 + Math.random()*10;
    this.op = 0; this.age = 0;
    this.ct = 20+Math.floor(Math.random()*25);
    this.mc = [4,3,2,2,1][Math.min(depth,4)];
    this.cc = 0; this.sa = Math.random()*6.28;
    this.kids = []; // {x,y,t} tendril draw data
  }
  update() {
    this.age++; this.op = Math.min(1, this.op+.05);
    if (this.r < this.tr) this.r = Math.min(this.tr, this.r+this.gr);
    this.kids.forEach(k => k.t = Math.min(1, k.t+.04));
    this.ct--;
    if (this.ct <= 0 && this.cc < this.mc && this.col.nodes.length < this.col.max && this.r > this.tr*.5) {
      this.ct = 15+Math.floor(Math.random()*22);
      this.spawn();
    }
  }
  spawn() {
    this.cc++;
    let bs=-1, bx=this.x, by=this.y, ba=this.sa;
    for (let t=0; t<18; t++) {
      const a = this.sa+(Math.random()-.5)*2;
      const dist = this.r*.6+this.tr*.4+Math.random()*this.tr*.5;
      const tx=this.x+Math.cos(a)*dist, ty=this.y+Math.sin(a)*dist;
      if (tx<2||tx>C.width-2||ty<2||ty>C.height-2) continue;
      const sc = eat(tx,ty)*.7+Math.random()*.3;
      if (sc > bs) { bs=sc; bx=tx; by=ty; ba=a; }
    }
    this.sa = ba+(Math.random()-.5)*.6;
    this.col.nodes.push(new Node(bx, by, this.col, this.d+1));
    this.kids.push({x:bx, y:by, t:0, hue:this.hue});
  }
  draw() {
    // Tendrils
    this.kids.forEach(k => {
      if (k.t < .02) return;
      const ex = this.x+(k.x-this.x)*k.t, ey = this.y+(k.y-this.y)*k.t;
      X.save();
      X.globalAlpha = this.col.op*this.op*k.t*.5;
      X.strokeStyle = `hsl(${k.hue},60%,${this.lit+18}%)`;
      X.lineWidth = Math.max(.4, 1.4-this.d*.18);
      X.lineCap = 'round';
      X.shadowBlur = 4; X.shadowColor = `hsl(${k.hue},70%,${this.lit+20}%)`;
      X.beginPath(); X.moveTo(this.x,this.y); X.lineTo(ex,ey); X.stroke();
      X.restore();
    });
    // Coral cluster
    cluster(this.x, this.y, this.r*this.op, this.hue, this.lit, this.col.op*this.op);
  }
}

// ── Colony ────────────────────────────────────────────────
class Colony {
  constructor(x, y) {
    const s = snapped(x, y, 90);
    this.x=s.x; this.y=s.y; this.op=0; this.age=0;
    this.nodes=[]; this.max=25+Math.floor(Math.random()*25);
    this.st=55+Math.random()*55;
    this.nodes.push(new Node(this.x, this.y, this, 0));
  }
  update() {
    this.age++; this.op=Math.min(.94,this.op+.008);
    this.nodes.forEach(n=>n.update());
    this.st--;
    if (this.st<=0 && this.nodes.length>2) {
      this.st=40+Math.random()*50;
      const s=this.nodes[Math.floor(Math.random()*this.nodes.length)];
      for(let i=0;i<3;i++) spores.push(new Spore(s.x,s.y));
    }
  }
  draw() {
    const sorted=[...this.nodes].sort((a,b)=>b.tr-a.tr);
    sorted.forEach(n=>n.draw());
  }
}

// ── Spore ─────────────────────────────────────────────────
class Spore {
  constructor(x,y) {
    this.x=x; this.y=y;
    this.vx=(Math.random()-.5)*1.2; this.vy=-(Math.random()*1.1);
    this.life=1; this.dc=.003+Math.random()*.005;
    this.r=.4+Math.random()*1.2; this.hue=248+Math.random()*42;
  }
  update() {
    this.x+=this.vx; this.y+=this.vy; this.vy+=.008;
    this.life-=this.dc;
    if (this.life<.2&&Math.random()<.003&&cols.length<15) {
      if (eat(this.x,this.y)>.07||Math.random()<.1) {
        cols.push(new Colony(this.x,this.y));
        this.life=0;
      }
    }
  }
  draw() {
    X.save(); X.globalAlpha=this.life*.35;
    const g=X.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2);
    g.addColorStop(0,`hsl(${this.hue},70%,70%)`); g.addColorStop(1,'transparent');
    X.beginPath(); X.arc(this.x,this.y,this.r*2,0,6.28);
    X.fillStyle=g; X.fill(); X.restore();
  }
}

// ── Main ──────────────────────────────────────────────────
let cols=[], spores=[], running=false, fn=0, at=0;

function seed() {
  const n=2+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++) setTimeout(()=>{
    cols.push(new Colony(C.width*(.15+Math.random()*.7), C.height*(.4+Math.random()*.45)));
  }, i*1200+Math.random()*400);
}

function loop() {
  fn++;
  if(fn%14===0) edges();
  at++; if(at>140&&eready&&cols.length<14){at=0;autoseed();}
  X.clearRect(0,0,C.width,C.height);
  // Vignette
  const vg=X.createRadialGradient(C.width/2,C.height/2,C.height*.06,C.width/2,C.height/2,C.height*.9);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,2,.35)');
  X.fillStyle=vg; X.fillRect(0,0,C.width,C.height);

  cols.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0); spores.forEach(s=>{s.update();s.draw();});

  document.getElementById('info').textContent = cols.length+' colonias · '+cols.reduce((a,c)=>a+c.nodes.length,0)+' brotes';
  requestAnimationFrame(loop);
}

function autoseed(){
  for(let t=0;t<100;t++){
    const px=Math.random()*80,py=Math.random()*45;
    if(emap[Math.round(py)*80+Math.round(px)]>.3){
      cols.push(new Colony(px/80*C.width,py/45*C.height)); return;
    }
  }
}

document.getElementById('t').addEventListener('pointerdown',e=>{
  if(!running)return;
  cols.push(new Colony(e.clientX,e.clientY));
  for(let i=0;i<8;i++) spores.push(new Spore(e.clientX+(Math.random()-.5)*14,e.clientY));
});

document.getElementById('btn').addEventListener('click',async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});
    V.srcObject=stream; await V.play();
  }catch(e){}
  const s=document.getElementById('s');
  s.style.opacity='0'; setTimeout(()=>s.style.display='none',1200);
  running=true; loop(); seed();
});
</script>
</body>
</html>
