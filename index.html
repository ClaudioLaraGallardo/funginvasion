<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;width:100vw;height:100vh;}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#canvas{position:fixed;inset:0;width:100%;height:100%;z-index:2;}
#hud{position:fixed;top:12px;left:14px;z-index:25;pointer-events:none;font-family:monospace;font-size:9px;color:#a855f755;letter-spacing:.1em;}
#start{position:fixed;inset:0;z-index:20;background:#04000e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity 1.2s;}
#start h1{font-family:serif;font-size:16vw;color:#a855f7;letter-spacing:.12em;text-shadow:0 0 50px #7c3aed,0 0 100px #4c1d95;animation:gl 3s ease-in-out infinite;}
@keyframes gl{0%,100%{text-shadow:0 0 50px #7c3aed,0 0 100px #4c1d95;}50%{text-shadow:0 0 80px #a855f7,0 0 150px #7c3aed;}}
#start p{color:#7c3aed66;font-size:10px;letter-spacing:.3em;font-family:monospace;text-align:center;}
#start button{background:none;border:1px solid #7c3aed55;color:#e9d5ff;font-family:monospace;font-size:12px;letter-spacing:.2em;padding:16px 44px;cursor:pointer;}
#start button:active{background:#7c3aed18;}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud">FUNGI AR · <span id="info">cargando...</span></div>
<div id="start">
  <h1>FUNGI</h1>
  <p>AR · COLONIZACIÓN MICELIAL</p>
  <button id="btn">INICIAR INVASIÓN</button>
  <p style="opacity:.3;font-size:9px;">toca la pantalla para sembrar</p>
</div>
<script>
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();window.addEventListener('resize',resize);

// ── Edge detection (async, non-blocking via setTimeout) ───
const EW=120,EH=68;
const sCanvas=document.createElement('canvas');
sCanvas.width=EW;sCanvas.height=EH;
const sCtx=sCanvas.getContext('2d',{willReadFrequently:true});
let edgeMap=new Float32Array(EW*EH);
let edgeBusy=false,edgeReady=false;

function runEdge(){
  if(edgeBusy||video.readyState<2){setTimeout(runEdge,200);return;}
  edgeBusy=true;
  // Draw video to tiny canvas
  sCtx.drawImage(video,0,0,EW,EH);
  const d=sCtx.getImageData(0,0,EW,EH).data;
  // Run Sobel in next microtask so it doesn't block frame
  setTimeout(()=>{
    const g=new Float32Array(EW*EH);
    for(let i=0;i<EW*EH;i++)g[i]=(d[i*4]*.299+d[i*4+1]*.587+d[i*4+2]*.114)/255;
    for(let y=1;y<EH-1;y++)for(let x=1;x<EW-1;x++){
      const i=y*EW+x;
      const gx=-g[i-EW-1]+g[i-EW+1]-2*g[i-1]+2*g[i+1]-g[i+EW-1]+g[i+EW+1];
      const gy=-g[i-EW-1]-2*g[i-EW]-g[i-EW+1]+g[i+EW-1]+2*g[i+EW]+g[i+EW+1];
      // blend with previous for stability
      edgeMap[i]=edgeMap[i]*.3+Math.min(1,Math.sqrt(gx*gx+gy*gy)*3.2)*.7;
    }
    edgeReady=true;edgeBusy=false;
    setTimeout(runEdge,150); // run again in 150ms
  },0);
}

function eAt(sx,sy){
  if(!edgeReady)return 0;
  const px=Math.max(0,Math.min(EW-1,Math.round(sx/canvas.width*EW)));
  const py=Math.max(0,Math.min(EH-1,Math.round(sy/canvas.height*EH)));
  return edgeMap[py*EW+px];
}
function bestEdge(x,y,r){
  let bv=0,bx=x,by=y;
  for(let i=0;i<32;i++){
    const a=i/32*6.28,d=r*(.05+Math.random()*.95);
    const tx=x+Math.cos(a)*d,ty=y+Math.sin(a)*d;
    const v=eAt(tx,ty);
    if(v>bv){bv=v;bx=tx;by=ty;}
  }
  return bv>0.08?{x:bx,y:by}:{x,y};
}

// ── Coral cluster renderer ────────────────────────────────
function drawCluster(cx,cy,r,hue,lit,alpha){
  if(r<1.5||alpha<.01)return;
  const n=Math.max(3,Math.round(r/4));
  ctx.save();
  ctx.globalAlpha=alpha*.08;
  const g0=ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.5);
  g0.addColorStop(0,`hsl(${hue},65%,${lit}%)`);g0.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,cy,r*2.5,0,6.28);ctx.fillStyle=g0;ctx.fill();
  for(let i=0;i<n;i++){
    const la=(i/n)*6.28+(cx*.008+cy*.005);
    const lr=r*(.28+((i*7919+Math.round(cx*cy))%100)/100*.42);
    const lx=cx+Math.cos(la)*r*.3,ly=cy+Math.sin(la)*r*.3;
    const ll=lit+8+((i*37+Math.round(cx))%22);
    ctx.globalAlpha=alpha*.78;
    const g=ctx.createRadialGradient(lx-lr*.22,ly-lr*.28,0,lx,ly,lr);
    g.addColorStop(0,`hsl(${hue-10},50%,${Math.min(88,ll+26)}%)`);
    g.addColorStop(.45,`hsl(${hue},68%,${ll+8}%)`);
    g.addColorStop(.82,`hsl(${hue+14},60%,${ll}%)`);
    g.addColorStop(1,`hsl(${hue+24},50%,${Math.max(8,ll-20)}%)`);
    ctx.beginPath();
    for(let p=0;p<=8;p++){
      const pa=(p/8)*6.28;
      const pr=lr*(.74+((p*19+i*31+Math.round(cx))%12)/12*.46);
      p===0?ctx.moveTo(lx+Math.cos(pa)*pr,ly+Math.sin(pa)*pr):ctx.lineTo(lx+Math.cos(pa)*pr,ly+Math.sin(pa)*pr);
    }
    ctx.closePath();ctx.fillStyle=g;
    ctx.shadowBlur=lr;ctx.shadowColor=`hsl(${hue},78%,${lit+20}%)`;ctx.fill();
  }
  ctx.globalAlpha=alpha*.55;
  const gc=ctx.createRadialGradient(cx-r*.15,cy-r*.2,0,cx,cy,r*.6);
  gc.addColorStop(0,`hsl(${hue-14},42%,${Math.min(90,lit+42)}%)`);
  gc.addColorStop(.5,`hsl(${hue},55%,${lit+20}%)`);gc.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,cy,r*.6,0,6.28);ctx.fillStyle=gc;ctx.fill();
  ctx.restore();
}

// ── Tendril renderer ──────────────────────────────────────
function drawTendril(pts,hue,thick,alpha){
  if(pts.length<2||alpha<.01)return;
  ctx.save();
  ctx.globalAlpha=alpha*.65;
  ctx.strokeStyle=`hsl(${hue},78%,50%)`;
  ctx.lineWidth=thick*2.2;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.shadowBlur=thick*6;ctx.shadowColor=`hsl(${hue},92%,64%)`;
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    if(i<pts.length-1){
      const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;
      ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
    }else ctx.lineTo(pts[i].x,pts[i].y);
  }
  ctx.stroke();
  ctx.globalAlpha=alpha*.9;
  ctx.strokeStyle=`hsl(${hue-6},52%,84%)`;
  ctx.lineWidth=thick*.6;ctx.shadowBlur=thick*2;ctx.stroke();
  ctx.restore();
}

// ── Tendril walker ────────────────────────────────────────
class Tendril{
  constructor(x,y,angle,col,depth){
    this.x=x;this.y=y;this.a=angle;this.col=col;this.d=depth;
    this.pts=[{x,y}];this.len=0;
    this.maxLen=Math.max(22,55+Math.random()*65-depth*8);
    this.sz=2.5+Math.random()*2;
    this.alive=true;this.spawnAt=14+Math.floor(Math.random()*14);
    this.spawned=false;
    this.hue=col.hue+depth*5+(Math.random()-.5)*14;
    this.thick=Math.max(1.0,3.2-depth*.36);
    this.wgl=0;
  }
  advance(){
    if(!this.alive)return;
    if(this.len>=this.maxLen){this.alive=false;return;}
    let bS=-1,bA=this.a;
    for(let c=0;c<9;c++){
      const sp=(c/8-.5)*.95,ta=this.a+sp;
      const tx=this.x+Math.cos(ta)*this.sz*2,ty=this.y+Math.sin(ta)*this.sz*2;
      if(tx<2||tx>canvas.width-2||ty<2||ty>canvas.height-2)continue;
      const e=eAt(tx,ty);
      const score=e*.72+Math.cos(sp)*.18+Math.random()*.1;
      if(score>bS){bS=score;bA=ta;}
    }
    this.wgl+=(bA-this.a)*.42;this.wgl*=.68;
    this.a+=this.wgl*.5+(Math.random()-.5)*.04;
    this.x+=Math.cos(this.a)*this.sz;this.y+=Math.sin(this.a)*this.sz;
    this.len+=this.sz;this.pts.push({x:this.x,y:this.y});
    if(!this.spawned&&this.len>=this.spawnAt){
      this.spawned=true;
      if(this.d<5&&this.col.tendrils.length<this.col.maxT){
        const n=this.d<2?(Math.random()<.6?2:1):1;
        for(let i=0;i<n;i++){
          const da=(Math.random()-.5)*(this.d<2?.85:1.1);
          this.col.tendrils.push(new Tendril(this.x,this.y,this.a+da,this.col,this.d+1));
        }
      }
      if(this.col.nodes.length<this.col.maxN){
        this.col.nodes.push({
          x:this.x,y:this.y,r:0,
          tr:(this.d===0?20:this.d===1?13:this.d===2?9:this.d===3?6:4)+Math.random()*5,
          hue:this.hue,lit:18+this.d*8,op:0,gr:.15+Math.random()*.18
        });
      }
    }
    if(this.x<1||this.x>canvas.width-1||this.y<1||this.y>canvas.height-1)this.alive=false;
  }
}

// ── Colony ────────────────────────────────────────────────
class Colony{
  constructor(x,y){
    const s=bestEdge(x,y,80);
    this.x=s.x;this.y=s.y;this.op=0;this.age=0;
    this.hue=250+Math.random()*35;
    this.tendrils=[];this.nodes=[];
    this.maxT=30+Math.floor(Math.random()*22);
    this.maxN=20+Math.floor(Math.random()*18);
    this.spt=50+Math.random()*40;
    const arms=3+Math.floor(Math.random()*3);
    for(let i=0;i<arms;i++)
      this.tendrils.push(new Tendril(this.x,this.y,(i/arms)*6.28+Math.random()*.5,this,0));
    this.nodes.push({x:this.x,y:this.y,r:0,tr:22+Math.random()*10,hue:this.hue,lit:16,op:0,gr:.18});
  }
  update(){
    this.age++;this.op=Math.min(.95,this.op+.009);
    this.tendrils.forEach(t=>t.advance());
    this.nodes.forEach(n=>{
      n.op=Math.min(1,n.op+.045);
      if(n.r<n.tr)n.r=Math.min(n.tr,n.r+n.gr);
    });
    this.spt--;
    if(this.spt<=0&&this.nodes.length>1){
      this.spt=35+Math.random()*35;
      const src=this.nodes[Math.floor(Math.random()*this.nodes.length)];
      for(let i=0;i<3;i++)spores.push(new Spore(src.x,src.y));
    }
  }
  draw(){
    [...this.nodes].sort((a,b)=>b.tr-a.tr).forEach(n=>{
      if(n.r<1||n.op<.01)return;
      drawCluster(n.x,n.y,n.r*n.op,n.hue,n.lit,this.op*n.op);
    });
    this.tendrils.forEach(t=>drawTendril(t.pts,t.hue,t.thick,this.op));
  }
}

class Spore{
  constructor(x,y){
    this.x=x;this.y=y;this.vx=(Math.random()-.5)*1.2;this.vy=-(Math.random()*.9+.1);
    this.life=1;this.dc=.004+Math.random()*.005;this.r=.5+Math.random()*1.2;this.hue=250+Math.random()*35;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;this.vy+=.009;this.life-=this.dc;
    if(this.life<.18&&Math.random()<.004&&cols.length<18){cols.push(new Colony(this.x,this.y));this.life=0;}
  }
  draw(){
    ctx.save();ctx.globalAlpha=this.life*.28;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2);
    g.addColorStop(0,`hsl(${this.hue},65%,68%)`);g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*2,0,6.28);ctx.fillStyle=g;ctx.fill();ctx.restore();
  }
}

// ── Main loop ─────────────────────────────────────────────
let cols=[],spores=[],running=false,fN=0,autoT=0;

function seed(){
  [[.15,.5],[.5,.38],[.82,.48],[.3,.72],[.65,.62]].forEach((p,i)=>{
    setTimeout(()=>cols.push(new Colony(canvas.width*p[0],canvas.height*p[1])),i*500+200);
  });
}
function autoSeed(){
  if(cols.length>=18)return;
  let ok=false;
  if(edgeReady){
    for(let t=0;t<80;t++){
      const x=canvas.width*(.05+Math.random()*.9),y=canvas.height*(.1+Math.random()*.85);
      if(eAt(x,y)>.2){cols.push(new Colony(x,y));ok=true;break;}
    }
  }
  if(!ok&&cols.length<8)
    cols.push(new Colony(canvas.width*(.1+Math.random()*.8),canvas.height*(.35+Math.random()*.55)));
}

function loop(){
  fN++;autoT++;
  if(autoT>90){autoT=0;autoSeed();}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const vg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*.05,canvas.width/2,canvas.height/2,canvas.height*.9);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,3,.25)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,canvas.width,canvas.height);
  cols.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0);spores.forEach(s=>{s.update();s.draw();});
  document.getElementById('info').textContent=cols.length+' col · '+cols.reduce((a,c)=>a+c.nodes.length,0)+' nodos';
  requestAnimationFrame(loop);
}

canvas.addEventListener('pointerdown',e=>{
  if(!running)return;
  e.preventDefault();
  cols.push(new Colony(e.clientX,e.clientY));
  for(let i=0;i<10;i++)spores.push(new Spore(e.clientX+(Math.random()-.5)*15,e.clientY));
});

document.getElementById('btn').addEventListener('click',async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false
    });
    video.srcObject=stream;await video.play();
    runEdge(); // start edge detection loop
  }catch(e){console.warn('No camera',e);}
  document.getElementById('start').style.opacity='0';
  setTimeout(()=>document.getElementById('start').style.display='none',1200);
  running=true;loop();seed();
});
</script>
</body>
</html>
