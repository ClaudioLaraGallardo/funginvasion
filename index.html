<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
#v{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#c{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
#t{position:fixed;inset:0;z-index:3;}
#s{position:fixed;inset:0;z-index:20;background:#04000e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity 1s;}
#s h1{font-family:serif;font-size:15vw;color:#a855f7;letter-spacing:.1em;text-shadow:0 0 40px #7c3aed,0 0 80px #4c1d95;}
#s p{color:#7c3aed77;font-size:11px;letter-spacing:.3em;font-family:monospace;}
#s button{background:none;border:1px solid #7c3aed44;color:#e9d5ff;font-family:monospace;font-size:11px;letter-spacing:.2em;padding:14px 36px;cursor:pointer;}
#hud{position:fixed;top:12px;left:14px;z-index:10;pointer-events:none;font-family:monospace;font-size:9px;color:#a855f744;letter-spacing:.1em;line-height:1.8;}
</style>
</head>
<body>
<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="t"></div>
<div id="hud">FUNGI AR<br><span id="info"></span></div>
<div id="s">
  <h1>FUNGI</h1>
  <p>AR · COLONIZACIÓN MICELIAL</p>
  <button id="btn">INICIAR INVASIÓN</button>
  <p style="font-size:9px;opacity:.3">Toca para sembrar</p>
</div>
<script>
const C=document.getElementById('c'), X=C.getContext('2d');
const V=document.getElementById('v');
const SC=document.createElement('canvas');
SC.width=80;SC.height=45;
const SX=SC.getContext('2d',{willReadFrequently:true});
function rsz(){C.width=innerWidth;C.height=innerHeight;}
rsz();window.addEventListener('resize',rsz);

// ── Edge map ──────────────────────────────────────────────
let EM=new Float32Array(3600), eR=false, fN=0;
function updE(){
  if(V.readyState<2)return;
  SX.drawImage(V,0,0,80,45);
  const d=SX.getImageData(0,0,80,45).data;
  const g=new Float32Array(3600);
  for(let i=0;i<3600;i++)g[i]=(d[i*4]*.3+d[i*4+1]*.59+d[i*4+2]*.11)/255;
  for(let y=1;y<44;y++)for(let x=1;x<79;x++){
    const i=y*80+x;
    const gx=-g[i-81]+g[i-79]-2*g[i-1]+2*g[i+1]-g[i+79]+g[i+81];
    const gy=-g[i-81]-2*g[i-80]-g[i-79]+g[i+79]+2*g[i+80]+g[i+81];
    EM[i]=EM[i]*.25+Math.min(1,Math.sqrt(gx*gx+gy*gy)*3.5)*.75;
  }
  eR=true;
}
function eAt(sx,sy){
  if(!eR)return 0;
  return EM[Math.max(0,Math.min(44,Math.round(sy/C.height*45)))*80+Math.max(0,Math.min(79,Math.round(sx/C.width*80)))];
}
function snap(x,y,r){
  let bv=0,bx=x,by=y;
  for(let i=0;i<28;i++){
    const a=i/28*6.28,d=r*(.05+Math.random()*.95);
    const tx=x+Math.cos(a)*d,ty=y+Math.sin(a)*d;
    const v=eAt(tx,ty);
    if(v>bv){bv=v;bx=tx;by=ty;}
  }
  return bv>0.1?{x:bx,y:by}:{x,y};
}

// ── Edge-following tendril walker ─────────────────────────
// This creates the visible mycelium strands that hug surfaces
class Tendril {
  constructor(x,y,angle,col,depth){
    this.x=x; this.y=y; this.a=angle; this.col=col; this.d=depth;
    this.pts=[{x,y}];
    this.len=0;
    this.maxLen=40+Math.random()*80-depth*10;
    this.maxLen=Math.max(20,this.maxLen);
    this.step=3+Math.random()*3;
    this.alive=true;
    this.spawnAge=15+Math.floor(Math.random()*20);
    this.spawned=false;
    this.hue=col.hue+depth*5+(Math.random()-.5)*15;
    this.thick=Math.max(0.5,2.2-depth*.28);
    this.edgeBias=0.7+Math.random()*0.25; // strongly follows edges
    this.wgl=0; // wiggle accumulator
  }
  step_() {
    if(!this.alive)return;
    if(this.len>=this.maxLen){this.alive=false;return;}

    // Look ahead — strongly prefer edge directions
    let bScore=-1, bAngle=this.a;
    for(let c=0;c<9;c++){
      const spread=(c/8-.5)*1.0;
      const ta=this.a+spread;
      const tx=this.x+Math.cos(ta)*this.step*1.8;
      const ty=this.y+Math.sin(ta)*this.step*1.8;
      if(tx<2||tx>C.width-2||ty<2||ty>C.height-2)continue;
      const e=eAt(tx,ty);
      const fwd=Math.cos(spread)*.2;
      const score=e*this.edgeBias+fwd+Math.random()*(1-this.edgeBias)*.35;
      if(score>bScore){bScore=score;bAngle=ta;}
    }
    // Smooth steering
    this.wgl+=(bAngle-this.a)*.4; this.wgl*=.7;
    this.a+=this.wgl*.5+(Math.random()-.5)*.05;
    this.x+=Math.cos(this.a)*this.step;
    this.y+=Math.sin(this.a)*this.step;
    this.len+=this.step;
    this.pts.push({x:this.x,y:this.y});

    // Spawn child tendrils and coral nodes from tips
    if(!this.spawned && this.len>=this.spawnAge){
      this.spawned=true;
      if(this.d<5 && this.col.tendrils.length<this.col.maxT){
        const n=this.d<2?(Math.random()<.55?2:1):1;
        for(let i=0;i<n;i++){
          const da=(Math.random()-.5)*(this.d<2?.9:1.2);
          this.col.tendrils.push(new Tendril(this.x,this.y,this.a+da,this.col,this.d+1));
        }
      }
      // Drop a coral cluster at branch point
      if(this.col.nodes.length<this.col.maxN){
        this.col.nodes.push(new CoralNode(this.x,this.y,this.col,this.d));
      }
    }
    if(this.x<1||this.x>C.width-1||this.y<1||this.y>C.height-1)this.alive=false;
  }
  draw(colOp){
    if(this.pts.length<2)return;
    const lit=28+this.d*7;
    X.save();
    X.globalAlpha=colOp*.75;
    X.strokeStyle=`hsl(${this.hue},65%,${lit+15}%)`;
    X.lineWidth=this.thick;
    X.lineCap='round'; X.lineJoin='round';
    X.shadowBlur=this.thick*3.5;
    X.shadowColor=`hsl(${this.hue},80%,${lit+20}%)`;
    X.beginPath();
    X.moveTo(this.pts[0].x,this.pts[0].y);
    for(let i=1;i<this.pts.length;i++){
      if(i<this.pts.length-1){
        const mx=(this.pts[i].x+this.pts[i+1].x)/2;
        const my=(this.pts[i].y+this.pts[i+1].y)/2;
        X.quadraticCurveTo(this.pts[i].x,this.pts[i].y,mx,my);
      } else {
        X.lineTo(this.pts[i].x,this.pts[i].y);
      }
    }
    X.stroke();
    X.restore();
  }
}

// ── Coral cluster node ────────────────────────────────────
class CoralNode {
  constructor(x,y,col,depth){
    this.x=x; this.y=y; this.col=col; this.d=depth;
    const b=[18,12,8,5,3][Math.min(depth,4)];
    this.tr=b+Math.random()*b*.6; this.r=0;
    this.gr=.15+Math.random()*.2;
    this.hue=col.hue+depth*7+(Math.random()-.5)*12;
    this.lit=16+depth*8+Math.random()*10;
    this.op=0;
  }
  update(){
    this.op=Math.min(1,this.op+.04);
    if(this.r<this.tr) this.r=Math.min(this.tr,this.r+this.gr);
  }
  draw(colOp){
    const r=this.r*this.op; if(r<1)return;
    const a=colOp*this.op;
    const n=Math.max(2,Math.round(r/5));

    // Outer glow
    X.save(); X.globalAlpha=a*.12;
    const g0=X.createRadialGradient(this.x,this.y,0,this.x,this.y,r*2.5);
    g0.addColorStop(0,`hsl(${this.hue},65%,${this.lit+5}%)`);
    g0.addColorStop(1,'transparent');
    X.beginPath();X.arc(this.x,this.y,r*2.5,0,6.28);X.fillStyle=g0;X.fill();X.restore();

    // Lobes (organic irregular blobs arranged in cluster)
    for(let i=0;i<n;i++){
      const la=(i/n)*6.28+this.d*.4+(this.x*.01);
      const lr=r*(.32+((i*7919)%100/100)*.38);
      const lx=this.x+Math.cos(la)*r*.3, ly=this.y+Math.sin(la)*r*.3;
      const lobeLit=this.lit+10+((i*31)%20);
      X.save(); X.globalAlpha=a*.75;
      const g=X.createRadialGradient(lx-lr*.2,ly-lr*.25,0,lx,ly,lr);
      g.addColorStop(0,`hsl(${this.hue-8},50%,${Math.min(88,lobeLit+28)}%)`);
      g.addColorStop(.4,`hsl(${this.hue},65%,${lobeLit+8}%)`);
      g.addColorStop(.8,`hsl(${this.hue+12},60%,${lobeLit}%)`);
      g.addColorStop(1,`hsl(${this.hue+22},52%,${Math.max(8,lobeLit-18)}%)`);
      X.beginPath();
      // Slightly irregular polygon
      const ps=8;
      for(let p=0;p<=ps;p++){
        const pa=(p/ps)*6.28;
        const pv=((p*17+i*31+Math.round(this.x))%10)/10;
        const pr=lr*(.78+pv*.44);
        p===0?X.moveTo(lx+Math.cos(pa)*pr,ly+Math.sin(pa)*pr):X.lineTo(lx+Math.cos(pa)*pr,ly+Math.sin(pa)*pr);
      }
      X.closePath();
      X.fillStyle=g;
      X.shadowBlur=lr*.8; X.shadowColor=`hsl(${this.hue},75%,${this.lit+18}%)`;
      X.fill(); X.restore();
    }
    // Center cap
    X.save(); X.globalAlpha=a*.6;
    const gc=X.createRadialGradient(this.x-r*.15,this.y-r*.2,0,this.x,this.y,r*.6);
    gc.addColorStop(0,`hsl(${this.hue-12},42%,${Math.min(90,this.lit+40)}%)`);
    gc.addColorStop(.5,`hsl(${this.hue},55%,${this.lit+18}%)`);
    gc.addColorStop(1,'transparent');
    X.beginPath();X.arc(this.x,this.y,r*.6,0,6.28);X.fillStyle=gc;X.fill();X.restore();
  }
}

// ── Colony ────────────────────────────────────────────────
class Colony {
  constructor(x,y){
    const s=snap(x,y,90);
    this.x=s.x; this.y=s.y; this.op=0; this.age=0;
    this.hue=248+Math.random()*38;
    this.tendrils=[]; this.nodes=[];
    this.maxT=28+Math.floor(Math.random()*22);
    this.maxN=18+Math.floor(Math.random()*18);
    this.spt=55+Math.random()*55;
    // Seed initial tendrils radiating from anchor
    const arms=2+Math.floor(Math.random()*3);
    for(let i=0;i<arms;i++){
      const a=(i/arms)*6.28+Math.random()*.6;
      this.tendrils.push(new Tendril(this.x,this.y,a,this,0));
    }
    // Initial coral node at root
    this.nodes.push(new CoralNode(this.x,this.y,this,0));
  }
  update(){
    this.age++; this.op=Math.min(.95,this.op+.007);
    this.tendrils.forEach(t=>t.step_());
    this.nodes.forEach(n=>n.update());
    this.spt--;
    if(this.spt<=0&&this.nodes.length>1){
      this.spt=40+Math.random()*45;
      const src=this.nodes[Math.floor(Math.random()*this.nodes.length)];
      for(let i=0;i<3;i++) spores.push(new Spore(src.x,src.y));
    }
  }
  draw(){
    // Draw tendrils first (behind coral)
    this.tendrils.forEach(t=>t.draw(this.op));
    // Draw coral nodes large → small
    [...this.nodes].sort((a,b)=>b.tr-a.tr).forEach(n=>n.draw(this.op));
  }
}

// ── Spore ─────────────────────────────────────────────────
class Spore{
  constructor(x,y){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*1.2;this.vy=-(Math.random()*.9+.1);
    this.life=1;this.dc=.003+Math.random()*.005;
    this.r=.4+Math.random()*1.2;this.hue=248+Math.random()*42;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;this.vy+=.008;
    this.life-=this.dc;
    if(this.life<.2&&Math.random()<.003&&cols.length<14){
      if(eAt(this.x,this.y)>.07||Math.random()<.1){
        cols.push(new Colony(this.x,this.y));this.life=0;
      }
    }
  }
  draw(){
    X.save();X.globalAlpha=this.life*.3;
    const g=X.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2);
    g.addColorStop(0,`hsl(${this.hue},68%,68%)`);g.addColorStop(1,'transparent');
    X.beginPath();X.arc(this.x,this.y,this.r*2,0,6.28);X.fillStyle=g;X.fill();X.restore();
  }
}

// ── Loop ──────────────────────────────────────────────────
let cols=[],spores=[],running=false,at=0;

function seed(){
  const n=2+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++) setTimeout(()=>{
    cols.push(new Colony(C.width*(.15+Math.random()*.7),C.height*(.4+Math.random()*.45)));
  },i*1200+Math.random()*400);
}
function autoSeed(){
  if(!eR||cols.length>=13)return;
  for(let t=0;t<100;t++){
    const px=Math.random()*80,py=Math.random()*45;
    if(EM[Math.round(py)*80+Math.round(px)]>.3){
      cols.push(new Colony(px/80*C.width,py/45*C.height));return;
    }
  }
}
function loop(){
  fN++;
  if(fN%14===0)updE();
  at++;if(at>130){at=0;autoSeed();}
  X.clearRect(0,0,C.width,C.height);
  const vg=X.createRadialGradient(C.width/2,C.height/2,C.height*.06,C.width/2,C.height/2,C.height*.9);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,3,.32)');
  X.fillStyle=vg;X.fillRect(0,0,C.width,C.height);
  cols.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0);spores.forEach(s=>{s.update();s.draw();});
  const tot=cols.reduce((a,c)=>a+c.nodes.length,0);
  document.getElementById('info').textContent=cols.length+' col · '+tot+' nodos';
  requestAnimationFrame(loop);
}

document.getElementById('t').addEventListener('pointerdown',e=>{
  if(!running)return;
  cols.push(new Colony(e.clientX,e.clientY));
  for(let i=0;i<8;i++)spores.push(new Spore(e.clientX+(Math.random()-.5)*14,e.clientY));
});

document.getElementById('btn').addEventListener('click',async()=>{
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});
    V.srcObject=s;await V.play();
  }catch(e){}
  const el=document.getElementById('s');
  el.style.opacity='0';setTimeout(()=>el.style.display='none',1200);
  running=true;loop();seed();
});
</script>
</body>
</html>
