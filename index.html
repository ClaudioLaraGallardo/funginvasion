<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; touch-action:none; }
  #video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
  #canvas { position:fixed; inset:0; width:100%; height:100%; z-index:2; pointer-events:none; }
  #touch { position:fixed; inset:0; z-index:3; }
  #edgeCv, #smplCv { position:fixed; display:none; }

  #hud { position:fixed; top:0; left:0; right:0; z-index:10; pointer-events:none; padding:16px 18px; display:flex; justify-content:space-between; align-items:flex-start; }
  .htitle { font-family:'Bebas Neue',sans-serif; font-size:clamp(20px,5.5vw,32px); letter-spacing:.2em; color:#c084fc; text-shadow:0 0 18px #a855f766; line-height:1; }
  .hsub { font-family:'Space Mono',monospace; font-size:8px; color:#a855f744; letter-spacing:.2em; margin-top:3px; }
  .hstats { font-family:'Space Mono',monospace; font-size:8px; color:#c084fc55; letter-spacing:.08em; line-height:1.9; text-align:right; }

  #infect { position:fixed; bottom:26px; left:50%; transform:translateX(-50%); z-index:10; pointer-events:none; display:flex; align-items:center; gap:9px; }
  .il { font-family:'Space Mono',monospace; font-size:8px; color:#a855f755; letter-spacing:.15em; white-space:nowrap; }
  .itrack { width:90px; height:1px; background:#a855f720; }
  .ifill { height:100%; background:linear-gradient(90deg,#6d28d9,#c084fc); box-shadow:0 0 5px #a855f7; width:0%; transition:width .6s; }
  .ipct { font-family:'Space Mono',monospace; font-size:8px; color:#c084fc66; width:26px; }

  #start {
    position:fixed; inset:0; z-index:20;
    background:radial-gradient(ellipse at 50% 60%, #0e0318 0%, #020007 100%);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    transition:opacity 1.4s;
  }
  #bgc { position:absolute; inset:0; pointer-events:none; }
  .si { position:relative; z-index:2; text-align:center; padding:36px; }
  .si h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(70px,19vw,115px); color:#c084fc; letter-spacing:.14em; line-height:.85; text-shadow:0 0 50px #a855f777,0 0 100px #7c3aed44; animation:glow 3.5s ease-in-out infinite; }
  @keyframes glow { 0%,100%{text-shadow:0 0 50px #a855f777,0 0 100px #7c3aed44;} 50%{text-shadow:0 0 80px #c084fcaa,0 0 140px #a855f766;} }
  .si .sub { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.38em; color:#a855f744; margin:6px 0 44px; }
  .btn { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.22em; color:#e9d5ff; background:transparent; border:1px solid #a855f733; padding:16px 40px; cursor:pointer; transition:all .3s; }
  .btn:hover,.btn:active { border-color:#c084fc; box-shadow:0 0 20px #a855f730; background:#a855f710; }
  .hint { font-family:'Space Mono',monospace; font-size:7px; color:#a855f730; letter-spacing:.22em; margin-top:18px; }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="edgeCv"></canvas>
<canvas id="smplCv"></canvas>
<canvas id="canvas"></canvas>
<div id="touch"></div>

<div id="hud">
  <div><div class="htitle">FUNGI</div><div class="hsub">SURFACE DETECTION AR</div></div>
  <div class="hstats">COLONIAS: <span id="sCol">0</span><br>MASA: <span id="sMass">0</span><br>COBERTURA: <span id="sCov">0</span>%</div>
</div>
<div id="infect">
  <span class="il">INFECCIÓN</span>
  <div class="itrack"><div class="ifill" id="ifill"></div></div>
  <span class="ipct" id="ipct">0%</span>
</div>

<div id="start">
  <canvas id="bgc"></canvas>
  <div class="si">
    <h1>FUNGI</h1>
    <p class="sub">AR · COLONIZACIÓN MICELIAL</p>
    <button class="btn" id="startBtn">INICIAR INVASIÓN</button>
    <p class="hint">TOCA PARA SEMBRAR · SE ADAPTA A LAS SUPERFICIES</p>
  </div>
</div>

<script>
// ── Setup ─────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const video    = document.getElementById('video');
const edgeCv   = document.getElementById('edgeCv');
const smplCv   = document.getElementById('smplCv');
const edgeCtx  = edgeCv.getContext('2d', {willReadFrequently:true});
const smplCtx  = smplCv.getContext('2d', {willReadFrequently:true});

const PW=160, PH=90;
edgeCv.width=PW; edgeCv.height=PH;
smplCv.width=PW; smplCv.height=PH;

function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// ── Edge Detection ────────────────────────────────────────
let edgeMap = new Float32Array(PW*PH);
let edgeReady = false;
let frameCount = 0;

function updateEdges(){
  if(video.readyState < 2) return;
  smplCtx.drawImage(video, 0,0,PW,PH);
  const d = smplCtx.getImageData(0,0,PW,PH).data;
  const gray = new Float32Array(PW*PH);
  for(let i=0;i<PW*PH;i++) gray[i]=(d[i*4]*.299+d[i*4+1]*.587+d[i*4+2]*.114)/255;
  const next = new Float32Array(PW*PH);
  for(let y=1;y<PH-1;y++) for(let x=1;x<PW-1;x++){
    const i=y*PW+x;
    const gx=-gray[i-PW-1]+gray[i-PW+1]-2*gray[i-1]+2*gray[i+1]-gray[i+PW-1]+gray[i+PW+1];
    const gy=-gray[i-PW-1]-2*gray[i-PW]-gray[i-PW+1]+gray[i+PW-1]+2*gray[i+PW]+gray[i+PW+1];
    next[i]=Math.min(1,Math.sqrt(gx*gx+gy*gy)*2.8);
  }
  for(let i=0;i<PW*PH;i++) edgeMap[i]=edgeMap[i]*.35+next[i]*.65;
  edgeReady=true;
}

function edgeAt(sx,sy){
  if(!edgeReady) return 0;
  const px=Math.max(0,Math.min(PW-1,Math.round(sx/canvas.width*PW)));
  const py=Math.max(0,Math.min(PH-1,Math.round(sy/canvas.height*PH)));
  return edgeMap[py*PW+px];
}

function bestEdgeNear(sx,sy,radius=70){
  let bv=0,bx=sx,by=sy;
  for(let i=0;i<32;i++){
    const a=i/32*Math.PI*2, r=radius*(.2+Math.random()*.8);
    const tx=sx+Math.cos(a)*r, ty=sy+Math.sin(a)*r;
    const v=edgeAt(tx,ty);
    if(v>bv){bv=v;bx=tx;by=ty;}
  }
  return {x:bx,y:by,e:bv};
}

// ── Blob Node — the coral "puff" mass ─────────────────────
// Each colony is made of many overlapping blob nodes that
// grow on surfaces, creating dense volumetric coverage.
class BlobNode {
  constructor(x, y, parent){
    this.x=x; this.y=y;
    this.parent=parent;
    this.r=0;
    this.targetR = 8+Math.random()*28;
    // deeper hue variation: dark violet core, lilac mid, creamy white tip
    this.hue = parent.hue + (Math.random()-.5)*30;
    this.lightness = 35+Math.random()*40; // 35–75
    this.age=0;
    this.grown=false;
    this.growSpeed=0.4+Math.random()*0.5;
    this.children=[];
    this.spawnTimer=20+Math.random()*40;
    this.maxChildren=2+Math.floor(Math.random()*3);
    this.pulse=Math.random()*Math.PI*2;
    this.opacity=0;
    // child spawn direction follows surface
    this.spawnAngle = Math.random()*Math.PI*2;
  }

  update(){
    this.age++;
    this.pulse+=0.025;
    this.opacity=Math.min(1, this.opacity+0.04);
    if(!this.grown){
      this.r+=this.growSpeed;
      if(this.r>=this.targetR){this.r=this.targetR;this.grown=true;}
    }
    this.spawnTimer--;
    if(this.spawnTimer<=0 && this.children.length<this.maxChildren && this.parent.nodes.length<this.parent.maxNodes){
      this.spawnTimer=15+Math.random()*35;
      this.trySpawnChild();
    }
  }

  trySpawnChild(){
    // look for nearby edge to stick to
    const spread=0.9;
    let bestScore=-1, bestX=this.x, bestY=this.y;
    for(let t=0;t<16;t++){
      const a=this.spawnAngle+(Math.random()-.5)*spread;
      const dist=this.r*0.8+this.targetR*0.3+Math.random()*this.targetR*0.6;
      const tx=this.x+Math.cos(a)*dist;
      const ty=this.y+Math.sin(a)*dist;
      if(tx<0||tx>canvas.width||ty<0||ty>canvas.height) continue;
      const e=edgeAt(tx,ty);
      // prefer edges, but also allow organic growth
      const score=e*0.6+Math.random()*0.4;
      if(score>bestScore){bestScore=score;bestX=tx;bestY=ty;
        this.spawnAngle=a; // bias future spawns
      }
    }
    const child=new BlobNode(bestX,bestY,this.parent);
    child.hue=this.hue+(Math.random()-.5)*15;
    child.lightness=Math.min(82,this.lightness+Math.random()*12); // tips get lighter
    child.targetR=this.targetR*(0.5+Math.random()*0.5);
    this.children.push(child);
    this.parent.nodes.push(child);
  }

  draw(){
    if(this.r<0.5) return;
    const pr=this.r*(1+Math.sin(this.pulse)*0.04);
    ctx.save();
    ctx.globalAlpha=this.parent.opacity*this.opacity;

    // Outermost atmospheric haze
    ctx.globalAlpha=this.parent.opacity*this.opacity*0.12;
    const g3=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,pr*2.8);
    g3.addColorStop(0,`hsl(${this.hue},60%,${this.lightness}%)`);
    g3.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(this.x,this.y,pr*2.8,0,Math.PI*2);
    ctx.fillStyle=g3; ctx.fill();

    // Mid volume
    ctx.globalAlpha=this.parent.opacity*this.opacity*0.35;
    const g2=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,pr*1.6);
    g2.addColorStop(0,`hsl(${this.hue},75%,${this.lightness+10}%)`);
    g2.addColorStop(.5,`hsl(${this.hue},65%,${this.lightness}%)`);
    g2.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(this.x,this.y,pr*1.6,0,Math.PI*2);
    ctx.fillStyle=g2;
    ctx.shadowBlur=pr*0.8; ctx.shadowColor=`hsl(${this.hue},80%,60%)`;
    ctx.fill();

    // Dense core
    ctx.globalAlpha=this.parent.opacity*this.opacity*0.7;
    const g1=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,pr);
    g1.addColorStop(0,`hsl(${this.hue},85%,${Math.min(88,this.lightness+25)}%)`);
    g1.addColorStop(.4,`hsl(${this.hue},78%,${this.lightness+8}%)`);
    g1.addColorStop(1,`hsl(${this.hue},65%,${this.lightness-8}%)`);
    ctx.beginPath(); ctx.arc(this.x,this.y,pr,0,Math.PI*2);
    ctx.fillStyle=g1;
    ctx.shadowBlur=pr*0.5; ctx.shadowColor=`hsl(${this.hue},90%,70%)`;
    ctx.fill();

    // Bright specular tip on larger blobs
    if(pr>8){
      ctx.globalAlpha=this.parent.opacity*this.opacity*0.5;
      ctx.beginPath(); ctx.arc(this.x-pr*.2, this.y-pr*.25, pr*.22, 0, Math.PI*2);
      ctx.fillStyle=`hsla(${this.hue},60%,92%,0.8)`;
      ctx.shadowBlur=0; ctx.fill();
    }

    ctx.restore();
  }
}

// ── Connecting tendrils between blobs ─────────────────────
class Tendril {
  constructor(n1, n2, colony){
    this.n1=n1; this.n2=n2; this.colony=colony;
    this.hue=(n1.hue+n2.hue)/2;
    this.t=0; this.speed=0.025+Math.random()*.025;
    // control point for curve
    const mx=(n1.x+n2.x)/2, my=(n1.y+n2.y)/2;
    this.cx=mx+(Math.random()-.5)*30;
    this.cy=my+(Math.random()-.5)*30;
  }
  update(){ this.t=Math.min(1,this.t+this.speed); }
  draw(){
    if(this.t<=0.02) return;
    ctx.save();
    ctx.globalAlpha=this.colony.opacity*this.t*0.55;
    ctx.strokeStyle=`hsl(${this.hue},70%,60%)`;
    ctx.lineWidth=0.8+Math.random()*.4;
    ctx.shadowBlur=6; ctx.shadowColor=`hsl(${this.hue},80%,55%)`;
    ctx.lineCap='round';
    // draw partial curve up to t
    ctx.beginPath();
    ctx.moveTo(this.n1.x, this.n1.y);
    const ex=this.n1.x+(this.n2.x-this.n1.x)*this.t;
    const ey=this.n1.y+(this.n2.y-this.n1.y)*this.t;
    const cx2=this.n1.x+(this.cx-this.n1.x)*this.t;
    const cy2=this.n1.y+(this.cy-this.n1.y)*this.t;
    ctx.quadraticCurveTo(cx2,cy2,ex,ey);
    ctx.stroke();
    ctx.restore();
  }
}

// ── Colony ────────────────────────────────────────────────
class Colony {
  constructor(x,y){
    const anch=bestEdgeNear(x,y,90);
    this.x=anch.e>0.12 ? anch.x : x;
    this.y=anch.e>0.12 ? anch.y : y;
    this.hue=265+Math.random()*40;   // deep violet range
    this.opacity=0;
    this.nodes=[];
    this.tendrils=[];
    this.maxNodes=60+Math.floor(Math.random()*80);
    this.age=0;
    this.tendrilTimer=0;
    this.sporeTimer=80+Math.random()*100;
    // seed root node
    const root=new BlobNode(this.x,this.y,this);
    root.targetR=12+Math.random()*18;
    this.nodes.push(root);
  }

  update(){
    this.age++;
    this.opacity=Math.min(0.92,this.opacity+0.012);
    this.nodes.forEach(n=>n.update());
    this.tendrils.forEach(t=>t.update());

    // periodically connect nearby nodes with tendrils
    this.tendrilTimer++;
    if(this.tendrilTimer>20 && this.nodes.length>1){
      this.tendrilTimer=0;
      const n1=this.nodes[Math.floor(Math.random()*this.nodes.length)];
      const n2=this.nodes[Math.floor(Math.random()*this.nodes.length)];
      if(n1!==n2){
        const d=Math.hypot(n1.x-n2.x,n1.y-n2.y);
        if(d<120 && d>10 && this.tendrils.length<120)
          this.tendrils.push(new Tendril(n1,n2,this));
      }
    }

    // emit spores from outer nodes
    this.sporeTimer--;
    if(this.sporeTimer<=0 && this.nodes.length>3){
      this.sporeTimer=50+Math.random()*80;
      const outer=this.nodes[Math.floor(Math.random()*this.nodes.length)];
      const cnt=2+Math.floor(Math.random()*4);
      for(let i=0;i<cnt;i++) spores.push(new Spore(outer.x,outer.y));
      if(Math.random()<.25) clouds.push(new Cloud(outer.x,outer.y));
    }
  }

  draw(){
    // draw tendrils first (behind blobs)
    this.tendrils.forEach(t=>t.draw());
    // draw nodes back-to-front by size (large first = darker base)
    const sorted=[...this.nodes].sort((a,b)=>b.r-a.r);
    sorted.forEach(n=>n.draw());
  }

  get mass(){ return this.nodes.length; }
}

// ── Floating Spore ────────────────────────────────────────
class Spore {
  constructor(x,y){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*2.2;
    this.vy=-(0.2+Math.random()*2);
    this.life=1; this.decay=0.003+Math.random()*.007;
    this.r=.6+Math.random()*2;
    this.hue=262+Math.random()*55;
    this.landed=false;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=0.011; this.vx+=(Math.random()-.5)*.04;
    this.life-=this.decay;
    if(!this.landed&&this.life<0.25&&Math.random()<.004&&colonies.length<30){
      if(edgeAt(this.x,this.y)>0.08||Math.random()<.25){
        colonies.push(new Colony(this.x,this.y));
        this.landed=true;
      }
    }
  }
  draw(){
    ctx.save(); ctx.globalAlpha=this.life*.65;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*3);
    g.addColorStop(0,`hsl(${this.hue},85%,80%)`); g.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*3,0,Math.PI*2);
    ctx.fillStyle=g; ctx.shadowBlur=8; ctx.shadowColor=`hsl(${this.hue},80%,65%)`;
    ctx.fill(); ctx.restore();
  }
}

// ── Volumetric cloud puff ─────────────────────────────────
class Cloud {
  constructor(x,y){
    this.x=x+(Math.random()-.5)*50; this.y=y;
    this.r=10+Math.random()*50;
    this.vx=(Math.random()-.5)*.25; this.vy=-(0.05+Math.random()*.3);
    this.life=.4+Math.random()*.5; this.decay=.001+Math.random()*.002;
    this.hue=262+Math.random()*42;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.r+=.1;this.life-=this.decay;}
  draw(){
    ctx.save(); ctx.globalAlpha=this.life*.14;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,`hsla(${this.hue},60%,55%,1)`);
    g.addColorStop(.6,`hsla(${this.hue},50%,35%,.5)`);
    g.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill(); ctx.restore();
  }
}

// ── State ─────────────────────────────────────────────────
let colonies=[],spores=[],clouds=[];
let running=false;

function seedInitial(){
  const n=2+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const x=canvas.width*(0.12+Math.random()*.76);
      const y=canvas.height*(0.45+Math.random()*.42);
      colonies.push(new Colony(x,y));
      for(let j=0;j<8;j++) spores.push(new Spore(x,y-5));
    }, i*1000+Math.random()*500);
  }
}

// Auto-seed on strong edge zones
let autoTimer=0;
function autoSeed(){
  if(colonies.length>=22) return;
  let planted=0;
  for(let tries=0;tries<120&&planted<2;tries++){
    const px=Math.random()*PW, py=Math.random()*PH;
    const e=edgeMap[Math.round(py)*PW+Math.round(px)];
    if(e>0.25||(colonies.length<2&&Math.random()<.1)){
      colonies.push(new Colony(px/PW*canvas.width, py/PH*canvas.height));
      planted++;
    }
  }
}

function drawVignette(){
  const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*.08,canvas.width/2,canvas.height/2,canvas.height*.88);
  g.addColorStop(0,'transparent'); g.addColorStop(1,'rgba(2,0,8,.48)');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawCorners(){
  const sz=14; ctx.save(); ctx.strokeStyle='#a855f718'; ctx.lineWidth=1;
  [[10,10,1,1],[canvas.width-10,10,-1,1],[10,canvas.height-10,1,-1],[canvas.width-10,canvas.height-10,-1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath(); ctx.moveTo(x,y+dy*sz); ctx.lineTo(x,y); ctx.lineTo(x+dx*sz,y); ctx.stroke();
  }); ctx.restore();
}

function updateHUD(){
  const mass=colonies.reduce((a,c)=>a+c.mass,0);
  const cov=Math.min(100,colonies.length*4+mass*.12);
  document.getElementById('sCol').textContent=colonies.length;
  document.getElementById('sMass').textContent=mass;
  document.getElementById('sCov').textContent=Math.round(cov);
  document.getElementById('ifill').style.width=cov+'%';
  document.getElementById('ipct').textContent=Math.round(cov)+'%';
}

function loop(){
  frameCount++;
  if(frameCount%10===0) updateEdges();
  autoTimer++;
  if(autoTimer>100&&edgeReady){autoTimer=0;autoSeed();}

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawVignette();
  clouds=clouds.filter(c=>c.life>0); clouds.forEach(c=>{c.update();c.draw();});
  colonies.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0); spores.forEach(s=>{s.update();s.draw();});
  drawCorners();
  updateHUD();
  requestAnimationFrame(loop);
}

document.getElementById('touch').addEventListener('pointerdown',e=>{
  if(!running) return;
  colonies.push(new Colony(e.clientX,e.clientY));
  for(let i=0;i<18;i++) spores.push(new Spore(e.clientX+(Math.random()-.5)*30,e.clientY));
  for(let i=0;i<6;i++) clouds.push(new Cloud(e.clientX,e.clientY));
});

async function startCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=s; await video.play(); return true;
  }catch{
    try{const s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});video.srcObject=s;await video.play();return true;}
    catch{return false;}
  }
}

// ── Start screen ──────────────────────────────────────────
const bgc=document.getElementById('bgc'), bctx=bgc.getContext('2d');
bgc.width=window.innerWidth; bgc.height=window.innerHeight;
const bgP=Array.from({length:90},()=>({x:Math.random()*bgc.width,y:Math.random()*bgc.height,r:.5+Math.random()*2.2,vx:(Math.random()-.5)*.3,vy:-(0.06+Math.random()*.42),life:Math.random(),decay:.0012+Math.random()*.003,hue:255+Math.random()*55}));
let bgRun=true;
function animBg(){
  if(!bgRun) return;
  bctx.clearRect(0,0,bgc.width,bgc.height);
  bgP.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<0){p.life=.7+Math.random()*.4;p.y=bgc.height+5;p.x=Math.random()*bgc.width;}
    bctx.save();bctx.globalAlpha=p.life*.55;
    const g=bctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3);
    g.addColorStop(0,`hsl(${p.hue},85%,72%)`);g.addColorStop(1,'transparent');
    bctx.beginPath();bctx.arc(p.x,p.y,p.r*3,0,Math.PI*2);
    bctx.fillStyle=g;bctx.fill();bctx.restore();
  });
  requestAnimationFrame(animBg);
}
animBg();

document.getElementById('startBtn').addEventListener('click',async()=>{
  await startCam();
  bgRun=false;
  const s=document.getElementById('start');
  s.style.opacity='0'; setTimeout(()=>{s.style.display='none';},1400);
  running=true; loop(); seedInitial();
});
</script>
