<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
#v{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#c{position:fixed;inset:0;width:100%;height:100%;z-index:2;}
#s{position:fixed;inset:0;z-index:10;background:#04000e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
#s h1{font-family:serif;font-size:18vw;color:#a855f7;letter-spacing:.1em;text-shadow:0 0 40px #7c3aed;}
#s p{color:#7c3aed77;font-size:10px;letter-spacing:.3em;font-family:monospace;}
#s button{background:none;border:1px solid #7c3aed55;color:#e9d5ff;font-family:monospace;font-size:11px;letter-spacing:.2em;padding:14px 38px;cursor:pointer;}
</style>
</head>
<body>
<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="s">
  <h1>FUNGI</h1>
  <p>AR · COLONIZACIÓN MICELIAL</p>
  <button id="btn">INICIAR INVASIÓN</button>
  <p style="opacity:.3;font-size:8px;">toca para sembrar</p>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),V=document.getElementById('v');
function rsz(){C.width=innerWidth;C.height=innerHeight;}
rsz();window.addEventListener('resize',rsz);

// ── Coral cluster — pre-computed geometry, no noise ───────
function cluster(cx,cy,r,hue,lit,a){
  if(r<1||a<.01)return;
  const n=Math.max(3,r/4|0);
  X.save();
  // glow
  X.globalAlpha=a*.07;
  let g=X.createRadialGradient(cx,cy,0,cx,cy,r*2.2);
  g.addColorStop(0,`hsl(${hue},60%,${lit}%)`);g.addColorStop(1,'transparent');
  X.beginPath();X.arc(cx,cy,r*2.2,0,6.28);X.fillStyle=g;X.fill();
  // lobes
  for(let i=0;i<n;i++){
    const la=(i/n)*6.28+(cx*.007);
    const lr=r*(.3+((i*79+cx*cy|0)%10)/10*.35);
    const lx=cx+Math.cos(la)*r*.28,ly=cy+Math.sin(la)*r*.28;
    const ll=lit+8+((i*37+cx|0)%20);
    X.globalAlpha=a*.8;
    g=X.createRadialGradient(lx-lr*.2,ly-lr*.25,0,lx,ly,lr);
    g.addColorStop(0,`hsl(${hue-8},50%,${Math.min(86,ll+24)}%)`);
    g.addColorStop(.5,`hsl(${hue},68%,${ll+6}%)`);
    g.addColorStop(1,`hsl(${hue+20},50%,${Math.max(8,ll-18)}%)`);
    // simple circle per lobe — FAST
    X.beginPath();X.arc(lx,ly,lr,0,6.28);
    X.fillStyle=g;X.shadowBlur=lr*.7;X.shadowColor=`hsl(${hue},78%,55%)`;X.fill();
  }
  // cap
  X.globalAlpha=a*.5;
  g=X.createRadialGradient(cx-r*.15,cy-r*.2,0,cx,cy,r*.55);
  g.addColorStop(0,`hsl(${hue-12},42%,${Math.min(90,lit+42)}%)`);
  g.addColorStop(.5,`hsl(${hue},52%,${lit+18}%)`);g.addColorStop(1,'transparent');
  X.beginPath();X.arc(cx,cy,r*.55,0,6.28);X.fillStyle=g;X.fill();
  X.restore();
}

// ── Tendril ───────────────────────────────────────────────
function tendril(pts,hue,thick,a){
  if(pts.length<2||a<.01)return;
  X.save();
  X.globalAlpha=a*.7;
  X.strokeStyle=`hsl(${hue},75%,52%)`;
  X.lineWidth=thick*2;X.lineCap='round';X.lineJoin='round';
  X.shadowBlur=thick*5;X.shadowColor=`hsl(${hue},90%,65%)`;
  X.beginPath();X.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    if(i<pts.length-1){
      const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;
      X.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
    }else X.lineTo(pts[i].x,pts[i].y);
  }
  X.stroke();
  X.globalAlpha=a*.9;X.strokeStyle=`hsl(${hue-5},50%,86%)`;
  X.lineWidth=thick*.5;X.shadowBlur=thick*1.5;X.stroke();
  X.restore();
}

// ── Node: grows + branches organically ───────────────────
class Node{
  constructor(x,y,col,d,angle){
    this.x=x;this.y=y;this.col=col;this.d=d;
    this.hue=col.hue+d*6+(Math.random()-.5)*15;
    this.lit=18+d*9+Math.random()*10;
    const b=[22,14,9,6,4][Math.min(d,4)];
    this.tr=b+Math.random()*b*.5;
    this.r=0;this.gr=.14+Math.random()*.18;
    this.op=0;this.age=0;
    // tendril grows from parent position toward this node
    this.tpts=[];this.tlen=0;
    this.tmax=20+Math.random()*30-d*3;this.tmax=Math.max(12,this.tmax);
    this.ta=angle;this.thick=Math.max(.8,3-d*.32);
    this.done=false;this.kids=[];this.kc=0;
    this.mc=[4,3,2,2,1][Math.min(d,4)];
    this.kt=18+Math.floor(Math.random()*22);
  }
  update(){
    this.age++;this.op=Math.min(1,this.op+.05);
    if(this.r<this.tr)this.r=Math.min(this.tr,this.r+this.gr);
    // grow tendril
    if(!this.done){
      for(let s=0;s<2;s++){
        if(this.tlen>=this.tmax){this.done=true;break;}
        this.ta+=(Math.random()-.5)*.1;
        const nx=this.x+Math.cos(this.ta)*3,ny=this.y+Math.sin(this.ta)*3;
        this.tpts.push({x:nx,y:ny});
        this.x=nx;this.y=ny;this.tlen+=3;
      }
    }
    // spawn kids
    if(this.done&&this.kt-->0===false){
      this.kt=16+Math.floor(Math.random()*20);
      if(this.kc<this.mc&&this.col.nodes.length<this.col.mx){
        this.kc++;
        const a=this.ta+(Math.random()-.5)*(this.d<2?1:1.4);
        const nd=new Node(this.x,this.y,this.col,this.d+1,a);
        this.kids.push(nd);this.col.nodes.push(nd);
      }
    }
  }
  draw(){
    const a=this.col.op*this.op;
    if(this.tpts.length>1)tendril(this.tpts,this.hue,this.thick,a);
    cluster(this.x,this.y,this.r*this.op,this.hue,this.lit,a);
  }
}

// ── Colony ────────────────────────────────────────────────
class Colony{
  constructor(x,y){
    this.x=x;this.y=y;this.op=0;this.age=0;
    this.hue=252+Math.random()*32;
    this.nodes=[];this.mx=20+Math.floor(Math.random()*15);
    this.sr=0;this.str=18+Math.random()*8;
    this.spt=50+Math.random()*40;
    // seed arms
    const arms=3+Math.floor(Math.random()*2);
    for(let i=0;i<arms;i++){
      const nd=new Node(x,y,this,(0),(i/arms)*6.28+Math.random()*.4);
      this.nodes.push(nd);
    }
  }
  update(){
    this.age++;this.op=Math.min(.92,this.op+.01);
    this.sr=Math.min(this.str,this.sr+.2);
    this.nodes.forEach(n=>n.update());
    this.spt--;
    if(this.spt<=0&&this.nodes.length>1){
      this.spt=35+Math.random()*30;
      const s=this.nodes[Math.floor(Math.random()*this.nodes.length)];
      for(let i=0;i<3;i++)spores.push(new Spore(s.x,s.y));
    }
  }
  draw(){
    cluster(this.x,this.y,this.sr*this.op,this.hue,16,this.op);
    // draw large nodes first
    [...this.nodes].sort((a,b)=>b.tr-a.tr).forEach(n=>n.draw());
  }
}

class Spore{
  constructor(x,y){
    this.x=x;this.y=y;this.vx=(Math.random()-.5)*.9;this.vy=-(Math.random()*.7+.1);
    this.life=1;this.dc=.005+Math.random()*.005;this.r=.4+Math.random()*1;this.hue=252+Math.random()*32;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;this.vy+=.008;this.life-=this.dc;
    if(this.life<.15&&Math.random()<.003&&cols.length<14)
      {cols.push(new Colony(this.x,this.y));this.life=0;}
  }
  draw(){
    X.save();X.globalAlpha=this.life*.25;
    const g=X.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2);
    g.addColorStop(0,`hsl(${this.hue},65%,68%)`);g.addColorStop(1,'transparent');
    X.beginPath();X.arc(this.x,this.y,this.r*2,0,6.28);X.fillStyle=g;X.fill();X.restore();
  }
}

let cols=[],spores=[],running=false,at=0;

function seed(){
  [[.15,.5],[.5,.38],[.8,.48],[.3,.7],[.65,.6]].forEach((p,i)=>
    setTimeout(()=>cols.push(new Colony(C.width*p[0],C.height*p[1])),i*600+100));
}

function loop(){
  at++;if(at>100&&cols.length<14){at=0;
    cols.push(new Colony(C.width*(.1+Math.random()*.8),C.height*(.3+Math.random()*.55)));}
  X.clearRect(0,0,C.width,C.height);
  const vg=X.createRadialGradient(C.width/2,C.height/2,C.height*.05,C.width/2,C.height/2,C.height*.9);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,3,.22)');
  X.fillStyle=vg;X.fillRect(0,0,C.width,C.height);
  cols.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0);spores.forEach(s=>{s.update();s.draw();});
  requestAnimationFrame(loop);
}

C.addEventListener('pointerdown',e=>{
  if(!running)return;
  e.preventDefault();
  cols.push(new Colony(e.clientX,e.clientY));
  for(let i=0;i<8;i++)spores.push(new Spore(e.clientX+(Math.random()-.5)*12,e.clientY));
});

document.getElementById('btn').addEventListener('click',async()=>{
  try{
    const s=await navigator.mediaDevices.getUserMedia(
      {video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});
    V.srcObject=s;await V.play();
  }catch(e){}
  const el=document.getElementById('s');
  el.style.transition='opacity .8s';el.style.opacity='0';
  setTimeout(()=>el.style.display='none',900);
  running=true;loop();seed();
});
</script>
</body>
</html>
