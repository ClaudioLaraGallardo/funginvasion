<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
#v{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#c{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
#t{position:fixed;inset:0;z-index:3;}
#s{position:fixed;inset:0;z-index:20;background:#04000e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity 1s;}
#s h1{font-family:serif;font-size:16vw;color:#a855f7;letter-spacing:.12em;text-shadow:0 0 50px #7c3aed,0 0 100px #4c1d95;}
#s p{color:#7c3aed66;font-size:10px;letter-spacing:.35em;font-family:monospace;text-align:center;}
#s button{background:none;border:1px solid #7c3aed55;color:#e9d5ff;font-family:monospace;font-size:11px;letter-spacing:.2em;padding:15px 40px;cursor:pointer;transition:.3s;}
#s button:active{background:#7c3aed18;border-color:#a855f7;}
</style>
</head>
<body>
<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="t"></div>
<div id="s">
  <h1>FUNGI</h1>
  <p>AR · COLONIZACIÓN MICELIAL</p>
  <button id="btn">INICIAR INVASIÓN</button>
  <p style="opacity:.35;margin-top:-8px;">toca la pantalla para sembrar</p>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const V=document.getElementById('v');
function rsz(){C.width=innerWidth;C.height=innerHeight;}
rsz();window.addEventListener('resize',rsz);

// ── Coral cluster renderer ────────────────────────────────
// Pre-compute random offsets per cluster to avoid per-frame randomness
function drawCluster(cx,cy,r,hue,lit,alpha){
  if(r<1||alpha<.01)return;
  const n=Math.max(3,Math.round(r/4.5));
  X.save();
  // Soft outer glow
  X.globalAlpha=alpha*.1;
  const g0=X.createRadialGradient(cx,cy,0,cx,cy,r*2.4);
  g0.addColorStop(0,`hsl(${hue},65%,${lit+5}%)`);g0.addColorStop(1,'transparent');
  X.beginPath();X.arc(cx,cy,r*2.4,0,6.28);X.fillStyle=g0;X.fill();
  // Irregular lobes
  for(let i=0;i<n;i++){
    const la=(i/n)*6.28+(cx*.008)+(cy*.005);
    const lr=r*(.3+((i*7919+Math.round(cx*cy))%100)/100*.38);
    const lx=cx+Math.cos(la)*r*.3,ly=cy+Math.sin(la)*r*.3;
    const ll=lit+10+((i*37+Math.round(cx))%20);
    X.globalAlpha=alpha*.75;
    const g=X.createRadialGradient(lx-lr*.22,ly-lr*.28,0,lx,ly,lr);
    g.addColorStop(0,`hsl(${hue-10},50%,${Math.min(86,ll+26)}%)`);
    g.addColorStop(.45,`hsl(${hue},68%,${ll+8}%)`);
    g.addColorStop(.82,`hsl(${hue+14},60%,${ll}%)`);
    g.addColorStop(1,`hsl(${hue+24},50%,${Math.max(8,ll-20)}%)`);
    X.beginPath();
    for(let p=0;p<=8;p++){
      const pa=(p/8)*6.28;
      const pr=lr*(.74+((p*19+i*31+Math.round(cx))%12)/12*.46);
      p===0?X.moveTo(lx+Math.cos(pa)*pr,ly+Math.sin(pa)*pr):X.lineTo(lx+Math.cos(pa)*pr,ly+Math.sin(pa)*pr);
    }
    X.closePath();X.fillStyle=g;
    X.shadowBlur=lr*.9;X.shadowColor=`hsl(${hue},78%,${lit+20}%)`;X.fill();
  }
  // Central bright cap
  X.globalAlpha=alpha*.55;
  const gc=X.createRadialGradient(cx-r*.15,cy-r*.2,0,cx,cy,r*.6);
  gc.addColorStop(0,`hsl(${hue-14},42%,${Math.min(90,lit+42)}%)`);
  gc.addColorStop(.5,`hsl(${hue},55%,${lit+20}%)`);gc.addColorStop(1,'transparent');
  X.beginPath();X.arc(cx,cy,r*.6,0,6.28);X.fillStyle=gc;X.fill();
  X.restore();
}

// ── Draw tendril segment ──────────────────────────────────
function drawTendrilPath(pts,hue,thick,alpha){
  if(pts.length<2||alpha<.01)return;
  const lit=42;
  X.save();
  // Thick glowing outer
  X.globalAlpha=alpha*.55;
  X.strokeStyle=`hsl(${hue},75%,${lit+8}%)`;
  X.lineWidth=thick*2.2;X.lineCap='round';X.lineJoin='round';
  X.shadowBlur=thick*6;X.shadowColor=`hsl(${hue},90%,${lit+22}%)`;
  X.beginPath();X.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    if(i<pts.length-1){
      const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;
      X.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
    } else X.lineTo(pts[i].x,pts[i].y);
  }
  X.stroke();
  // Bright inner core
  X.globalAlpha=alpha*.88;
  X.strokeStyle=`hsl(${hue-6},52%,${Math.min(90,lit+34)}%)`;
  X.lineWidth=thick*.55;X.shadowBlur=thick*2;X.stroke();
  X.restore();
}

// ── Node: a coral cluster that grows and branches ─────────
class Node{
  constructor(x,y,depth,hue,parentAngle){
    this.x=x;this.y=y;this.d=depth;
    this.hue=hue+(Math.random()-.5)*18;
    this.lit=18+depth*8+Math.random()*10;
    this.tr=(depth===0?22:depth===1?14:depth===2?9:depth===3?6:4)+Math.random()*5;
    this.r=0;this.gr=.16+Math.random()*.2;
    this.op=0;this.age=0;
    // Tendril to parent stored as path points
    this.tendrilPts=[];
    this.tendrilLen=0;
    this.tendrilMax=30+Math.random()*40-depth*4;
    this.tendrilMax=Math.max(15,this.tendrilMax);
    this.tendrilAngle=parentAngle;
    this.tendrilDone=false;
    this.tendrilThick=Math.max(1,3.2-depth*.38);
    // Children
    this.kids=[];
    this.maxKids=depth<1?4:depth<3?3:depth<5?2:1;
    this.kidCount=0;
    this.kidTimer=20+Math.floor(Math.random()*25);
    this.col=null; // set by colony
  }
  update(){
    this.age++;this.op=Math.min(1,this.op+.045);
    if(this.r<this.tr)this.r=Math.min(this.tr,this.r+this.gr);
    // Grow tendril path outward (simple organic curve, no edge detection)
    if(!this.tendrilDone){
      const steps=2;
      for(let s=0;s<steps;s++){
        if(this.tendrilLen>=this.tendrilMax){this.tendrilDone=true;break;}
        // Gentle curve with slight random drift
        this.tendrilAngle+=(Math.random()-.5)*.12;
        const nx=this.x+Math.cos(this.tendrilAngle)*3;
        const ny=this.y+Math.sin(this.tendrilAngle)*3;
        this.tendrilPts.push({x:nx,y:ny});
        this.x=nx;this.y=ny;
        this.tendrilLen+=3;
      }
    }
    // Spawn children
    this.kidTimer--;
    if(this.kidTimer<=0&&this.kidCount<this.maxKids&&this.tendrilDone&&this.d<6){
      this.kidTimer=18+Math.floor(Math.random()*22);
      this.spawnKid();
    }
  }
  spawnKid(){
    if(!this.col||this.col.nodes.length>=this.col.maxN)return;
    this.kidCount++;
    const spread=this.d<2?.9:1.2;
    const angle=this.tendrilAngle+(Math.random()-.5)*spread*2;
    const kid=new Node(this.x,this.y,this.d+1,this.hue,angle);
    kid.col=this.col;
    this.kids.push(kid);
    this.col.nodes.push(kid);
  }
  draw(colOp){
    const a=colOp*this.op;
    // Draw tendril path
    if(this.tendrilPts.length>1)
      drawTendrilPath(this.tendrilPts,this.hue,this.tendrilThick,a);
    // Draw coral cluster at current tip
    drawCluster(this.x,this.y,this.r*this.op,this.hue,this.lit,a);
  }
}

// ── Colony ────────────────────────────────────────────────
class Colony{
  constructor(x,y){
    this.x=x;this.y=y;this.op=0;this.age=0;
    this.hue=250+Math.random()*35;
    this.nodes=[];this.maxN=25+Math.floor(Math.random()*20);
    this.spt=50+Math.random()*40;
    // Seed root node + initial arms
    const arms=3+Math.floor(Math.random()*3);
    for(let i=0;i<arms;i++){
      const a=(i/arms)*6.28+Math.random()*.5;
      const root=new Node(x,y,0,this.hue,a);
      root.col=this;
      this.nodes.push(root);
    }
    // Root coral cluster
    this.rootR=0;this.rootTr=18+Math.random()*10;
  }
  update(){
    this.age++;this.op=Math.min(.95,this.op+.009);
    this.rootR=Math.min(this.rootTr,this.rootR+.2);
    this.nodes.forEach(n=>n.update());
    this.spt--;
    if(this.spt<=0&&this.nodes.length>1){
      this.spt=35+Math.random()*35;
      const src=this.nodes[Math.floor(Math.random()*this.nodes.length)];
      for(let i=0;i<3;i++)spores.push(new Spore(src.x,src.y));
    }
  }
  draw(){
    // Root cluster
    drawCluster(this.x,this.y,this.rootR*this.op,this.hue,16,this.op);
    // All nodes (clusters drawn on top of tendrils per node)
    this.nodes.forEach(n=>n.draw(this.op));
  }
}

// ── Floating spore ────────────────────────────────────────
class Spore{
  constructor(x,y){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*1.2;this.vy=-(Math.random()*.9+.1);
    this.life=1;this.dc=.004+Math.random()*.005;
    this.r=.5+Math.random()*1.2;this.hue=250+Math.random()*35;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;this.vy+=.009;this.life-=this.dc;
    if(this.life<.18&&Math.random()<.004&&cols.length<16){
      cols.push(new Colony(this.x,this.y));this.life=0;
    }
  }
  draw(){
    X.save();X.globalAlpha=this.life*.3;
    const g=X.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2.2);
    g.addColorStop(0,`hsl(${this.hue},68%,70%)`);g.addColorStop(1,'transparent');
    X.beginPath();X.arc(this.x,this.y,this.r*2.2,0,6.28);X.fillStyle=g;X.fill();X.restore();
  }
}

// ── Main ──────────────────────────────────────────────────
let cols=[],spores=[],running=false,fN=0,autoT=0;

function seed(){
  // 5 colonies spread across screen
  [[.15,.5],[.5,.4],[.82,.48],[.3,.72],[.68,.65]].forEach((p,i)=>{
    setTimeout(()=>cols.push(new Colony(C.width*p[0],C.height*p[1])),i*500+100);
  });
}

function loop(){
  fN++;
  autoT++;if(autoT>100&&cols.length<16){autoT=0;cols.push(new Colony(C.width*(.1+Math.random()*.8),C.height*(.35+Math.random()*.5)));}
  X.clearRect(0,0,C.width,C.height);
  // Subtle vignette
  const vg=X.createRadialGradient(C.width/2,C.height/2,C.height*.05,C.width/2,C.height/2,C.height*.9);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,3,.25)');
  X.fillStyle=vg;X.fillRect(0,0,C.width,C.height);
  cols.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0);spores.forEach(s=>{s.update();s.draw();});
  requestAnimationFrame(loop);
}

document.getElementById('t').addEventListener('pointerdown',e=>{
  if(!running)return;
  cols.push(new Colony(e.clientX,e.clientY));
  for(let i=0;i<8;i++)spores.push(new Spore(e.clientX+(Math.random()-.5)*15,e.clientY));
});

document.getElementById('btn').addEventListener('click',async()=>{
  try{
    const s=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false
    });
    V.srcObject=s;await V.play();
  }catch(e){}
  const el=document.getElementById('s');
  el.style.opacity='0';setTimeout(()=>el.style.display='none',1200);
  running=true;loop();seed();
});
</script>
</body>
</html>
