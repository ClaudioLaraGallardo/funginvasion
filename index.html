<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUNGI AR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;width:100vw;height:100vh;touch-action:none;}
  #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
  #canvas{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
  #touch{position:fixed;inset:0;z-index:3;}
  #ecv,#scv{position:fixed;display:none;}

  #hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;}
  .ht{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,5vw,28px);letter-spacing:.2em;color:#c084fc;text-shadow:0 0 16px #a855f766;line-height:1;}
  .hs{font-family:'Space Mono',monospace;font-size:7px;color:#a855f740;letter-spacing:.18em;margin-top:2px;}
  .hr{font-family:'Space Mono',monospace;font-size:8px;color:#c084fc44;letter-spacing:.07em;line-height:1.9;text-align:right;}

  #bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:flex;align-items:center;gap:8px;}
  .bl{font-family:'Space Mono',monospace;font-size:7px;color:#a855f750;letter-spacing:.14em;white-space:nowrap;}
  .bt{width:80px;height:1px;background:#a855f718;}
  .bf{height:100%;background:linear-gradient(90deg,#5b21b6,#c084fc);box-shadow:0 0 4px #a855f7;width:0%;transition:width .5s;}
  .bp{font-family:'Space Mono',monospace;font-size:7px;color:#c084fc55;width:24px;}

  #start{position:fixed;inset:0;z-index:20;background:radial-gradient(ellipse at 50% 60%,#0d0219 0%,#010006 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 1.4s;}
  #bgc{position:absolute;inset:0;pointer-events:none;}
  .si{position:relative;z-index:2;text-align:center;padding:32px;}
  .si h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(68px,18vw,110px);color:#c084fc;letter-spacing:.14em;line-height:.85;text-shadow:0 0 50px #a855f777,0 0 100px #7c3aed44;animation:gl 3.5s ease-in-out infinite;}
  @keyframes gl{0%,100%{text-shadow:0 0 50px #a855f777,0 0 100px #7c3aed44;}50%{text-shadow:0 0 80px #c084fcaa,0 0 140px #a855f766;}}
  .si .sub{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.35em;color:#a855f740;margin:5px 0 40px;}
  .btn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;color:#e9d5ff;background:transparent;border:1px solid #a855f730;padding:15px 38px;cursor:pointer;transition:all .3s;}
  .btn:hover,.btn:active{border-color:#c084fc;box-shadow:0 0 18px #a855f728;background:#a855f70e;}
  .hint{font-family:'Space Mono',monospace;font-size:7px;color:#a855f728;letter-spacing:.2em;margin-top:16px;}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="ecv"></canvas><canvas id="scv"></canvas>
<canvas id="canvas"></canvas>
<div id="touch"></div>

<div id="hud">
  <div><div class="ht">FUNGI</div><div class="hs">SURFACE AR</div></div>
  <div class="hr">COLONIAS: <span id="sc">0</span><br>MASA: <span id="sm">0</span><br>COB: <span id="sv">0</span>%</div>
</div>
<div id="bar">
  <span class="bl">INFECCIÓN</span>
  <div class="bt"><div class="bf" id="bf"></div></div>
  <span class="bp" id="bp">0%</span>
</div>

<div id="start">
  <canvas id="bgc"></canvas>
  <div class="si">
    <h1>FUNGI</h1>
    <p class="sub">AR · COLONIZACIÓN MICELIAL</p>
    <button class="btn" id="startBtn">INICIAR INVASIÓN</button>
    <p class="hint">TOCA PARA SEMBRAR · SE ADAPTA A SUPERFICIES</p>
  </div>
</div>

<script>
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const video   = document.getElementById('video');
const ecv     = document.getElementById('ecv');
const scv     = document.getElementById('scv');
const ectx    = ecv.getContext('2d',{willReadFrequently:true});
const sctx    = scv.getContext('2d',{willReadFrequently:true});

const PW=160,PH=90;
ecv.width=PW;ecv.height=PH;scv.width=PW;scv.height=PH;

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// ── Edge map ──────────────────────────────────────────────
let edgeMap=new Float32Array(PW*PH);
let edgeReady=false,frame=0;

function updateEdges(){
  if(video.readyState<2)return;
  sctx.drawImage(video,0,0,PW,PH);
  const d=sctx.getImageData(0,0,PW,PH).data;
  const g=new Float32Array(PW*PH);
  for(let i=0;i<PW*PH;i++)g[i]=(d[i*4]*.299+d[i*4+1]*.587+d[i*4+2]*.114)/255;
  const n=new Float32Array(PW*PH);
  for(let y=1;y<PH-1;y++)for(let x=1;x<PW-1;x++){
    const i=y*PW+x;
    const gx=-g[i-PW-1]+g[i-PW+1]-2*g[i-1]+2*g[i+1]-g[i+PW-1]+g[i+PW+1];
    const gy=-g[i-PW-1]-2*g[i-PW]-g[i-PW+1]+g[i+PW-1]+2*g[i+PW]+g[i+PW+1];
    n[i]=Math.min(1,Math.sqrt(gx*gx+gy*gy)*3.0);
  }
  for(let i=0;i<PW*PH;i++)edgeMap[i]=edgeMap[i]*.3+n[i]*.7;
  edgeReady=true;
}

function eAt(sx,sy){
  if(!edgeReady)return 0;
  const px=Math.max(0,Math.min(PW-1,Math.round(sx/canvas.width*PW)));
  const py=Math.max(0,Math.min(PH-1,Math.round(sy/canvas.height*PH)));
  return edgeMap[py*PW+px];
}

function nearEdge(sx,sy,r=80){
  let bv=0,bx=sx,by=sy;
  for(let i=0;i<40;i++){
    const a=i/40*Math.PI*2,d=r*(.15+Math.random()*.85);
    const tx=sx+Math.cos(a)*d,ty=sy+Math.sin(a)*d;
    const v=eAt(tx,ty);
    if(v>bv){bv=v;bx=tx;by=ty;}
  }
  return{x:bx,y:by,e:bv};
}

// ── Particle — the atomic unit of volume ──────────────────
// Each particle is a soft fuzzy disc. Thousands together = coral mass.
class Particle {
  constructor(x,y,col){
    this.x=x; this.y=y; this.col=col;
    this.r=2+Math.random()*14;         // radius of fuzz disc
    this.targetR=this.r;
    this.life=0; this.maxLife=1;
    this.hue=col.hue+(Math.random()-.5)*25;
    // lightness: 30 (dark core base) → 75 (bright tip)
    // deeper/older particles darker, surface ones lighter
    this.lit=32+Math.random()*45;
    this.sat=55+Math.random()*35;
    this.vx=(Math.random()-.5)*.3;
    this.vy=-(Math.random()*.2);
    this.settled=false;
    this.settleTime=10+Math.floor(Math.random()*20);
    this.age=0;
    this.pulse=Math.random()*Math.PI*2;
    this.opacity=0;
  }
  update(){
    this.age++;
    this.pulse+=0.02;
    this.opacity=Math.min(1,this.opacity+0.06);
    if(!this.settled){
      this.x+=this.vx; this.y+=this.vy;
      this.vy+=0.04;
      if(this.age>=this.settleTime)this.settled=true;
    }
    // gentle breathing
    const breath=1+Math.sin(this.pulse)*0.03;
    this.r=this.targetR*breath;
  }
  draw(){
    const pr=this.r;
    ctx.save();
    ctx.globalAlpha=this.col.opacity*this.opacity;

    // Layer 1: outer atmospheric haze (very soft, large)
    ctx.globalAlpha=this.col.opacity*this.opacity*0.08;
    const g3=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,pr*3.2);
    g3.addColorStop(0,`hsl(${this.hue},${this.sat}%,${this.lit}%)`);
    g3.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(this.x,this.y,pr*3.2,0,Math.PI*2);
    ctx.fillStyle=g3;ctx.fill();

    // Layer 2: medium volume
    ctx.globalAlpha=this.col.opacity*this.opacity*0.22;
    const g2=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,pr*1.7);
    g2.addColorStop(0,`hsl(${this.hue},${this.sat+10}%,${this.lit+12}%)`);
    g2.addColorStop(.6,`hsl(${this.hue},${this.sat}%,${this.lit}%)`);
    g2.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(this.x,this.y,pr*1.7,0,Math.PI*2);
    ctx.fillStyle=g2;
    ctx.shadowBlur=pr*.6;ctx.shadowColor=`hsl(${this.hue},80%,55%)`;
    ctx.fill();

    // Layer 3: dense opaque core
    ctx.globalAlpha=this.col.opacity*this.opacity*0.65;
    const g1=ctx.createRadialGradient(this.x,this.y,pr*.05,this.x,this.y,pr);
    g1.addColorStop(0,`hsl(${this.hue},${this.sat+15}%,${Math.min(85,this.lit+28)}%)`);
    g1.addColorStop(.45,`hsl(${this.hue},${this.sat+5}%,${this.lit+10}%)`);
    g1.addColorStop(1,`hsl(${this.hue},${this.sat-5}%,${Math.max(15,this.lit-10)}%)`);
    ctx.beginPath();ctx.arc(this.x,this.y,pr,0,Math.PI*2);
    ctx.fillStyle=g1;
    ctx.shadowBlur=pr*.4;ctx.shadowColor=`hsl(${this.hue},85%,65%)`;
    ctx.fill();

    // Layer 4: bright specular highlight on larger particles
    if(pr>6){
      ctx.globalAlpha=this.col.opacity*this.opacity*0.45;
      ctx.beginPath();
      ctx.arc(this.x-pr*.18,this.y-pr*.22,pr*.18,0,Math.PI*2);
      ctx.fillStyle=`hsla(${this.hue},40%,94%,0.9)`;
      ctx.shadowBlur=0;ctx.fill();
    }
    ctx.restore();
  }
}

// ── Growth Front — a walking agent that deposits particles ──
// This is what creates the coral-like branching structure.
class GrowthFront {
  constructor(x,y,angle,depth,col){
    this.x=x;this.y=y;
    this.angle=angle;
    this.depth=depth;
    this.col=col;
    this.alive=true;
    this.stepSize=3+Math.random()*5;
    this.age=0;
    this.depositRate=2; // particles per step
    this.maxAge=40+Math.floor(Math.random()*80)-depth*8;
    this.maxAge=Math.max(15,this.maxAge);
    this.edgeBias=0.6+Math.random()*0.35;
    this.wiggle=0;
    this.childSpawnAge=15+Math.floor(Math.random()*25);
    this.spawned=false;
  }

  step(){
    if(!this.alive)return;
    this.age++;
    if(this.age>this.maxAge){this.alive=false;return;}

    // Steer toward edges
    let bestAngle=this.angle,bestScore=-1;
    for(let c=0;c<9;c++){
      const spread=(c/8-.5)*1.1;
      const a=this.angle+spread;
      const tx=this.x+Math.cos(a)*this.stepSize*2;
      const ty=this.y+Math.sin(a)*this.stepSize*2;
      if(tx<0||tx>canvas.width||ty<0||ty>canvas.height)continue;
      const e=eAt(tx,ty);
      const fwd=Math.cos(spread)*.25;
      const score=e*this.edgeBias+fwd+Math.random()*(1-this.edgeBias)*.4;
      if(score>bestScore){bestScore=score;bestAngle=a;}
    }
    this.wiggle+=(bestAngle-this.angle)*.4;
    this.wiggle*=.72;
    this.angle+=this.wiggle*.5+(Math.random()-.5)*.06;
    this.x+=Math.cos(this.angle)*this.stepSize;
    this.y+=Math.sin(this.angle)*this.stepSize;

    // Deposit particles
    for(let i=0;i<this.depositRate;i++){
      const ox=(Math.random()-.5)*this.stepSize*.8;
      const oy=(Math.random()-.5)*this.stepSize*.8;
      const p=new Particle(this.x+ox,this.y+oy,this.col);
      // size tapers with depth
      p.targetR=(10+Math.random()*18)*(1-this.depth*.1);
      p.targetR=Math.max(2,p.targetR);
      // lighter particles toward tips
      p.lit=32+this.depth*5+Math.random()*25;
      this.col.particles.push(p);
    }

    // Spawn child branches
    if(!this.spawned&&this.age>=this.childSpawnAge&&this.depth<6&&this.col.fronts.length<40){
      this.spawned=true;
      const n=this.depth<3?(Math.random()<.55?2:1):1;
      for(let i=0;i<n;i++){
        const spread=(Math.random()-.5)*1.2;
        this.col.fronts.push(new GrowthFront(this.x,this.y,this.angle+spread,this.depth+1,this.col));
      }
    }

    if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height)this.alive=false;
  }
}

// ── Colony ────────────────────────────────────────────────
class Colony{
  constructor(x,y){
    const anch=nearEdge(x,y,100);
    this.x=anch.e>0.1?anch.x:x;
    this.y=anch.e>0.1?anch.y:y;
    this.hue=263+Math.random()*42;
    this.opacity=0;
    this.particles=[];
    this.fronts=[];
    this.age=0;
    this.sporeTimer=60+Math.random()*90;
    this.maxParticles=1200+Math.floor(Math.random()*800);

    // Seed initial growth fronts
    const arms=2+Math.floor(Math.random()*3);
    for(let i=0;i<arms;i++){
      const a=(i/arms)*Math.PI*2+(Math.random()-.5)*.8;
      this.fronts.push(new GrowthFront(this.x,this.y,a,0,this));
    }
    // Seed root mass
    for(let i=0;i<12;i++){
      const p=new Particle(this.x+(Math.random()-.5)*8,this.y+(Math.random()-.5)*8,this);
      p.targetR=10+Math.random()*20;
      p.lit=30+Math.random()*20;
      this.particles.push(p);
    }
  }

  update(){
    this.age++;
    this.opacity=Math.min(0.95,this.opacity+0.01);
    // Step fronts
    this.fronts.forEach(f=>f.step());
    // Remove dead fronts
    this.fronts=this.fronts.filter(f=>f.alive);
    // Update particles (cap for perf)
    const active=this.particles.slice(-this.maxParticles);
    if(active.length!==this.particles.length)this.particles=active;
    this.particles.forEach(p=>p.update());

    // Emit spores
    this.sporeTimer--;
    if(this.sporeTimer<=0&&this.particles.length>10){
      this.sporeTimer=40+Math.random()*70;
      const src=this.particles[Math.floor(Math.random()*this.particles.length)];
      for(let i=0;i<3+Math.floor(Math.random()*4);i++)
        spores.push(new Spore(src.x,src.y));
      if(Math.random()<.2)clouds.push(new Cloud(src.x,src.y));
    }
  }

  draw(){
    // Draw particles sorted large→small for depth effect
    const sorted=[...this.particles].sort((a,b)=>b.targetR-a.targetR);
    sorted.forEach(p=>p.draw());
  }

  get mass(){return this.particles.length;}
}

// ── Spore ─────────────────────────────────────────────────
class Spore{
  constructor(x,y){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*2.2;
    this.vy=-(0.15+Math.random()*1.9);
    this.life=1;this.decay=.003+Math.random()*.007;
    this.r=.5+Math.random()*2;this.hue=260+Math.random()*55;this.landed=false;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=.011;this.vx+=(Math.random()-.5)*.04;
    this.life-=this.decay;
    if(!this.landed&&this.life<.25&&Math.random()<.004&&colonies.length<25){
      if(eAt(this.x,this.y)>0.08||Math.random()<.2){
        colonies.push(new Colony(this.x,this.y));this.landed=true;
      }
    }
  }
  draw(){
    ctx.save();ctx.globalAlpha=this.life*.6;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*3);
    g.addColorStop(0,`hsl(${this.hue},85%,80%)`);g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*3,0,Math.PI*2);
    ctx.fillStyle=g;ctx.shadowBlur=8;ctx.shadowColor=`hsl(${this.hue},80%,65%)`;
    ctx.fill();ctx.restore();
  }
}

// ── Cloud puff ────────────────────────────────────────────
class Cloud{
  constructor(x,y){
    this.x=x+(Math.random()-.5)*45;this.y=y;
    this.r=8+Math.random()*45;
    this.vx=(Math.random()-.5)*.22;this.vy=-(0.04+Math.random()*.28);
    this.life=.35+Math.random()*.5;this.decay=.0009+Math.random()*.002;
    this.hue=260+Math.random()*42;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.r+=.08;this.life-=this.decay;}
  draw(){
    ctx.save();ctx.globalAlpha=this.life*.13;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,`hsla(${this.hue},58%,52%,1)`);
    g.addColorStop(.6,`hsla(${this.hue},48%,32%,.5)`);
    g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();ctx.restore();
  }
}

// ── State ─────────────────────────────────────────────────
let colonies=[],spores=[],clouds=[],running=false;

function seedInitial(){
  const n=2+Math.floor(Math.random()*2);
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const x=canvas.width*(.1+Math.random()*.8);
      const y=canvas.height*(.4+Math.random()*.45);
      colonies.push(new Colony(x,y));
      for(let j=0;j<6;j++)spores.push(new Spore(x,y-5));
    },i*1100+Math.random()*500);
  }
}

let autoT=0;
function autoSeed(){
  if(!edgeReady||colonies.length>=20)return;
  let p=0;
  for(let t=0;t<120&&p<2;t++){
    const px=Math.random()*PW,py=Math.random()*PH;
    const e=edgeMap[Math.round(py)*PW+Math.round(px)];
    if(e>.28||(colonies.length<2&&Math.random()<.08)){
      colonies.push(new Colony(px/PW*canvas.width,py/PH*canvas.height));p++;
    }
  }
}

function drawVig(){
  const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*.07,canvas.width/2,canvas.height/2,canvas.height*.88);
  g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(1,0,6,.45)');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
}

function updateHUD(){
  const mass=colonies.reduce((a,c)=>a+c.mass,0);
  const cov=Math.min(100,colonies.length*5+mass*.08);
  document.getElementById('sc').textContent=colonies.length;
  document.getElementById('sm').textContent=mass;
  document.getElementById('sv').textContent=Math.round(cov);
  document.getElementById('bf').style.width=cov+'%';
  document.getElementById('bp').textContent=Math.round(cov)+'%';
}

function loop(){
  frame++;
  if(frame%10===0)updateEdges();
  autoT++;if(autoT>110){autoT=0;autoSeed();}

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawVig();
  clouds=clouds.filter(c=>c.life>0);clouds.forEach(c=>{c.update();c.draw();});
  colonies.forEach(c=>{c.update();c.draw();});
  spores=spores.filter(s=>s.life>0);spores.forEach(s=>{s.update();s.draw();});
  updateHUD();
  requestAnimationFrame(loop);
}

document.getElementById('touch').addEventListener('pointerdown',e=>{
  if(!running)return;
  colonies.push(new Colony(e.clientX,e.clientY));
  for(let i=0;i<20;i++)spores.push(new Spore(e.clientX+(Math.random()-.5)*25,e.clientY));
  for(let i=0;i<6;i++)clouds.push(new Cloud(e.clientX,e.clientY));
});

async function startCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=s;await video.play();return true;
  }catch{
    try{const s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});video.srcObject=s;await video.play();return true;}
    catch{return false;}
  }
}

// Start screen
const bgc=document.getElementById('bgc'),bctx=bgc.getContext('2d');
bgc.width=window.innerWidth;bgc.height=window.innerHeight;
const bgP=Array.from({length:80},()=>({x:Math.random()*bgc.width,y:Math.random()*bgc.height,r:.4+Math.random()*2,vx:(Math.random()-.5)*.28,vy:-(0.05+Math.random()*.38),life:Math.random(),decay:.001+Math.random()*.0028,hue:255+Math.random()*55}));
let bgR=true;
function animBg(){
  if(!bgR)return;
  bctx.clearRect(0,0,bgc.width,bgc.height);
  bgP.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<0){p.life=.7+Math.random()*.4;p.y=bgc.height+5;p.x=Math.random()*bgc.width;}
    bctx.save();bctx.globalAlpha=p.life*.5;
    const g=bctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3);
    g.addColorStop(0,`hsl(${p.hue},85%,70%)`);g.addColorStop(1,'transparent');
    bctx.beginPath();bctx.arc(p.x,p.y,p.r*3,0,Math.PI*2);
    bctx.fillStyle=g;bctx.fill();bctx.restore();
  });
  requestAnimationFrame(animBg);
}
animBg();

document.getElementById('startBtn').addEventListener('click',async()=>{
  await startCam();
  bgR=false;
  const s=document.getElementById('start');
